name: Deploy to Production

on:
  push:
    tags:
      - "v*.*.*"

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.4.0"
  AWS_REGION: ap-southeast-2

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Deploy to Production EKS
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          aws eks update-kubeconfig --name elevatedpos-prod --region ${{ env.AWS_REGION }}

          # Ensure namespace exists
          kubectl create namespace elevatedpos --dry-run=client -o yaml | kubectl apply -f -

          # Apply secrets and configmap first
          kubectl apply -f infrastructure/k8s/serviceaccount.yaml
          kubectl apply -f infrastructure/k8s/configmap.yaml

          # Replace ACCOUNT_ID placeholder in k8s manifests used by Helm
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com"

          helm upgrade --install elevatedpos ./infrastructure/helm/elevatedpos \
            --namespace elevatedpos \
            --create-namespace \
            --set global.image.tag=$TAG \
            --set global.imageRegistry=$ECR_REGISTRY \
            --set global.environment=production \
            --wait --timeout 15m

      - name: Notify deployment
        if: always() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "ElevatedPOS Production Deployment ${{ job.status }}: ${{ github.ref_name }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
