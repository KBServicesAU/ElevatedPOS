name: Deploy to Production

on:
  push:
    tags:
      - "v*.*.*"

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.4.0"
  AWS_REGION: ap-southeast-2

jobs:
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: auth,            context: services/auth }
          - { name: catalog,         context: services/catalog }
          - { name: inventory,       context: services/inventory }
          - { name: orders,          context: services/orders }
          - { name: payments,        context: services/payments }
          - { name: customers,       context: services/customers }
          - { name: loyalty,         context: services/loyalty }
          - { name: campaigns,       context: services/campaigns }
          - { name: notifications,   context: services/notifications }
          - { name: integrations,    context: services/integrations }
          - { name: automations,     context: services/automations }
          - { name: ai,              context: services/ai }
          - { name: hardware-bridge, context: services/hardware-bridge }
          - { name: franchise,       context: services/franchise }
          - { name: reporting,       context: services/reporting }
          - { name: webhooks,        context: services/webhooks }
          - { name: web-backoffice,   context: apps/web-backoffice }
          - { name: kds-display,      context: apps/kds-display }
          - { name: storefront,       context: apps/storefront }
          - { name: godmode,          context: apps/godmode }
          - { name: org-portal,       context: apps/org-portal }
          - { name: reseller-portal,  context: apps/reseller-portal }
          - { name: pay,              context: apps/pay }
          - { name: sales-portal,     context: apps/sales-portal }
          - { name: partner-portal,   context: apps/partner-portal }
          - { name: developer-portal, context: apps/developer-portal }
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.target.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.target.context }}/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/elevatedpos/${{ matrix.target.name }}:${{ github.ref_name }}
            ${{ steps.login-ecr.outputs.registry }}/elevatedpos/${{ matrix.target.name }}:latest
          cache-from: type=gha,scope=${{ matrix.target.name }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.target.name }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-images
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Deploy to Production EKS
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          aws eks update-kubeconfig --name elevatedpos-prod --region ${{ env.AWS_REGION }}

          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com"

          # Annotate/label any pre-existing kubectl-managed resources so Helm
          # can adopt them without errors on the first helm upgrade.
          for RESOURCE in configmap/elevatedpos-config serviceaccount/elevatedpos-service; do
            if kubectl get $RESOURCE -n elevatedpos &>/dev/null; then
              kubectl annotate $RESOURCE -n elevatedpos \
                meta.helm.sh/release-name=elevatedpos \
                meta.helm.sh/release-namespace=elevatedpos \
                --overwrite
              kubectl label $RESOURCE -n elevatedpos \
                app.kubernetes.io/managed-by=Helm \
                --overwrite
            fi
          done

          # Clear any stuck or failed Helm release before attempting upgrade.
          HELM_STATUS=$(helm status elevatedpos -n elevatedpos -o json 2>/dev/null \
            | jq -r '.info.status' 2>/dev/null || echo "not-found")
          echo "Current Helm release status: $HELM_STATUS"
          if [[ "$HELM_STATUS" == "pending-upgrade" || \
                "$HELM_STATUS" == "pending-install" || \
                "$HELM_STATUS" == "pending-rollback" ]]; then
            echo "Rolling back stuck pending release..."
            helm rollback elevatedpos -n elevatedpos || true
          elif [[ "$HELM_STATUS" == "failed" ]]; then
            echo "Uninstalling failed release for fresh install..."
            helm uninstall elevatedpos -n elevatedpos || true
            sleep 5
          fi

          helm upgrade --install elevatedpos ./infrastructure/helm/elevatedpos \
            --namespace elevatedpos \
            --create-namespace \
            --set global.image.tag=$TAG \
            --set global.imageRegistry=$ECR_REGISTRY \
            --set global.environment=production

          # Run migrations job (fire-and-forget; don't block the deploy)
          find infrastructure/k8s -name "*.yaml" -exec \
            sed -i "s/ACCOUNT_ID/${{ secrets.AWS_ACCOUNT_ID }}/g" {} +
          kubectl delete job elevatedpos-migrations -n elevatedpos --ignore-not-found
          kubectl apply -f infrastructure/k8s/migrations-job.yaml
          echo "Migrations job submitted — running asynchronously in cluster."

          # Apply standalone app manifests and ingress rules (not managed by Helm)
          kubectl apply -f infrastructure/k8s/apps/pay.yaml
          kubectl apply -f infrastructure/k8s/apps/sales-portal.yaml
          kubectl apply -f infrastructure/k8s/apps/partner-portal.yaml
          kubectl apply -f infrastructure/k8s/apps/developer-portal.yaml
          kubectl apply -f infrastructure/k8s/ingress/pay-ingress.yaml
          kubectl apply -f infrastructure/k8s/ingress/portals-ingress.yaml

          # Wait for auth rollout then exec seed directly to upsert platform staff
          kubectl rollout status deployment/elevatedpos-auth \
            -n elevatedpos --timeout=5m || true
          AUTH_POD=$(kubectl get pod -n elevatedpos \
            -l app=elevatedpos-auth \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -n "$AUTH_POD" ]; then
            echo "Running auth seed on pod $AUTH_POD..."
            kubectl exec "$AUTH_POD" -n elevatedpos -- \
              node dist/db/seed.js || echo "Seed warning (non-fatal)"
          else
            echo "No running auth pod found — seed skipped."
          fi

      - name: Notify deployment
        if: always() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "ElevatedPOS Production Deployment ${{ job.status }}: ${{ github.ref_name }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
