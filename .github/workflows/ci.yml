name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      skip_e2e:
        description: 'Skip E2E tests (set true when called from deploy workflow)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: '9.4.0'
  NODE_VERSION: '22'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, catalog, inventory, orders, payments, customers, loyalty, campaigns, notifications, integrations, automations, franchise]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run tests for ${{ matrix.service }}
        run: pnpm --filter @nexus/${{ matrix.service }} test
        env:
          JWT_SECRET: test-secret
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/elevatedpos_test

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.service }}

  build:
    name: Build All
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      # Exclude storefront (marketing site) from CI build — it has a known
      # styled-jsx/SSR prerender conflict with Next.js 14.2.x that only
      # affects the default error page generation and is harmless in production.
      # The storefront is built separately in the deploy workflow.
      - run: pnpm build --filter='!@nexus/storefront'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            apps/web-backoffice/.next
          retention-days: 1

  e2e:
    name: E2E Tests (POS → KDS)
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ !inputs.skip_e2e }}
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: elevatedpos
          POSTGRES_PASSWORD: elevatedpos_dev
          POSTGRES_DB: elevatedpos_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @nexus/e2e exec playwright install --with-deps chromium

      - name: Build web-backoffice and kds-display
        run: |
          pnpm --filter @nexus/web-backoffice build
          pnpm --filter @nexus/kds-display build

      - name: Run E2E tests
        run: pnpm --filter @nexus/e2e test
        env:
          E2E_SKIP_WEBSERVER: false
          E2E_OFFLINE: true            # Skip tests that need a live orders WS
          BACKOFFICE_URL: http://localhost:3000
          KDS_URL: http://localhost:3001
          # No Stripe keys → demo mode for payment tests
          DATABASE_URL: postgresql://elevatedpos:elevatedpos_dev@localhost:5432/elevatedpos_dev
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: e2e-test-jwt-secret-min-32-chars-ok
          INTERNAL_SECRET: e2e-test-internal-secret

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        service: [auth, catalog, inventory, orders, payments, customers, loyalty, campaigns, notifications, integrations, automations, ai, franchise, reporting, webhooks]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for ${{ matrix.service }}
        run: docker build -f services/${{ matrix.service }}/Dockerfile -t elevatedpos-${{ matrix.service }}:test .
        continue-on-error: true
