name: Build Mobile APKs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: false
        default: 'all'
        type: choice
        options: [all, production-pos, production-kds, production-kiosk]

jobs:
  build:
    name: Build ${{ matrix.role }} APK
    runs-on: ubuntu-latest
    # One concurrency slot per role. If a newer tag triggers this job while
    # the same role is still queued/running, the older one is cancelled.
    # This prevents duplicate builds stacking up from rapid tag pushes.
    concurrency:
      group: build-mobile-${{ matrix.role }}
      cancel-in-progress: true
    strategy:
      matrix:
        role: [pos, kds, kiosk, dashboard, display]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '9'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # Install from workspace root so pnpm resolves the lockfile correctly.
      # --filter limits installation to the mobile package and its deps only,
      # avoiding downloading all 16 backend services.
      - name: Install mobile dependencies
        run: pnpm install --frozen-lockfile --filter @nexus/mobile...

      # Authenticate with Expo / EAS
      # ⚠️  Requires EXPO_TOKEN secret:
      #   expo.dev → Account Settings → Access Tokens → Create Token
      #   GitHub repo → Settings → Secrets → Actions → EXPO_TOKEN
      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Verify we're actually authenticated before queueing a build
      - name: Verify Expo auth
        run: eas whoami

      - name: Build ${{ matrix.role }} APK (Android)
        working-directory: apps/mobile
        run: |
          eas build \
            --profile production-${{ matrix.role }} \
            --platform android \
            --non-interactive \
            --no-wait
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL || 'https://api.elevatedpos.com.au' }}
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID || '5f03d9c6-0120-4047-aa27-f71a823afa7b' }}
