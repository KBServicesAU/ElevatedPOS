name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, prod]

env:
  AWS_REGION: ap-southeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com

jobs:
  # ── Run tests before deploying ────────────────────────────────────────────
  test:
    name: Test
    uses: ./.github/workflows/ci.yml
    with:
      skip_e2e: true

  # ── Build & push Docker images ────────────────────────────────────────────
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: auth,            context: services/auth }
          - { name: catalog,         context: services/catalog }
          - { name: inventory,       context: services/inventory }
          - { name: orders,          context: services/orders }
          - { name: payments,        context: services/payments }
          - { name: customers,       context: services/customers }
          - { name: loyalty,         context: services/loyalty }
          - { name: campaigns,       context: services/campaigns }
          - { name: notifications,   context: services/notifications }
          - { name: integrations,    context: services/integrations }
          - { name: automations,     context: services/automations }
          - { name: ai,              context: services/ai }
          - { name: hardware-bridge, context: services/hardware-bridge }
          - { name: franchise,       context: services/franchise }
          - { name: reporting,       context: services/reporting }
          - { name: webhooks,        context: services/webhooks }
          - { name: web-backoffice,  context: apps/web-backoffice }
          - { name: kds-display,     context: apps/kds-display }
          - { name: storefront,      context: apps/storefront }
          - { name: pay,             context: apps/pay }
          - { name: org-portal,      context: apps/org-portal }
          - { name: reseller-portal, context: apps/reseller-portal }
          - { name: godmode,         context: apps/godmode }
          - { name: sales-portal,    context: apps/sales-portal }
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.target.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.target.context }}/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/elevatedpos/${{ matrix.target.name }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/elevatedpos/${{ matrix.target.name }}:latest
          cache-from: type=gha,scope=${{ matrix.target.name }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.target.name }}

  # ── Deploy to Staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-images
    environment: staging
    continue-on-error: true
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || inputs.environment == 'staging') &&
      needs.build-images.result != 'cancelled'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name elevatedpos-staging --region ${{ env.AWS_REGION }}

      - name: Replace ACCOUNT_ID in manifests
        run: |
          find infrastructure/k8s -name "*.yaml" -exec \
            sed -i "s/ACCOUNT_ID/${{ secrets.AWS_ACCOUNT_ID }}/g" {} +

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f infrastructure/k8s/namespace.yaml
          kubectl apply -f infrastructure/k8s/serviceaccount.yaml
          kubectl apply -f infrastructure/k8s/configmap.yaml
          kubectl apply -f infrastructure/k8s/services/
          # Force-recreate portal services that were previously created without kubectl apply
          kubectl delete service godmode org-portal reseller-portal -n elevatedpos --ignore-not-found=true
          kubectl apply -f infrastructure/k8s/apps/
          # Remove any pre-existing portal ingresses that may conflict with portals-ingress.yaml
          kubectl delete ingress \
            elevatedpos-org-portal-ingress \
            elevatedpos-reseller-portal-ingress \
            elevatedpos-godmode-ingress \
            elevatedpos-portals-ingress \
            -n elevatedpos --ignore-not-found=true
          # infrastructure/k8s/ingress.yaml hosts are managed by Helm; skipped to avoid conflicts
          kubectl apply -f infrastructure/k8s/ingress/

      - name: Run database migrations
        run: |
          MIGRATE_SCRIPT='const {Pool}=require("pg");const {drizzle}=require("drizzle-orm/node-postgres");const {migrate}=require("drizzle-orm/node-postgres/migrator");const p=new Pool({connectionString:process.env.DATABASE_URL,ssl:{rejectUnauthorized:false}});const d=drizzle(p);migrate(d,{migrationsFolder:"src/db/migrations",migrationsTable:"__drizzle_migrations"}).then(()=>{console.log("migrations applied");p.end();process.exit(0);}).catch(e=>{console.error(e.message);p.end();process.exit(1);});'
          for SVC in auth catalog inventory orders payments customers loyalty campaigns notifications integrations automations franchise webhooks; do
            POD=$(kubectl get pods -n elevatedpos -l app=$SVC --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "$POD" ]; then
              echo "==> $SVC ($POD)"
              kubectl exec -n elevatedpos "$POD" -- node -e "$MIGRATE_SCRIPT" \
                && echo "$SVC: OK" \
                || echo "$SVC: WARN"
            else
              echo "$SVC: no running pod — skipping"
            fi
          done

      - name: Update image tags
        run: |
          SERVICES="auth catalog inventory orders payments customers loyalty campaigns notifications integrations automations ai hardware-bridge franchise reporting webhooks"
          for SVC in $SERVICES; do
            kubectl set image deployment/$SVC $SVC=${{ env.ECR_REGISTRY }}/elevatedpos/$SVC:${{ github.sha }} -n elevatedpos
          done
          kubectl set image deployment/web-backoffice web-backoffice=${{ env.ECR_REGISTRY }}/elevatedpos/web-backoffice:${{ github.sha }} -n elevatedpos
          kubectl set image deployment/kds-display kds-display=${{ env.ECR_REGISTRY }}/elevatedpos/kds-display:${{ github.sha }} -n elevatedpos
          kubectl set image deployment/storefront storefront=${{ env.ECR_REGISTRY }}/elevatedpos/storefront:${{ github.sha }} -n elevatedpos
          kubectl set image deployment/pay pay=${{ env.ECR_REGISTRY }}/elevatedpos/pay:${{ github.sha }} -n elevatedpos
          kubectl set image deployment/org-portal org-portal=${{ env.ECR_REGISTRY }}/elevatedpos/org-portal:${{ github.sha }} -n elevatedpos
          kubectl set image deployment/reseller-portal reseller-portal=${{ env.ECR_REGISTRY }}/elevatedpos/reseller-portal:${{ github.sha }} -n elevatedpos
          kubectl set image deployment/godmode godmode=${{ env.ECR_REGISTRY }}/elevatedpos/godmode:${{ github.sha }} -n elevatedpos
          kubectl set image deployment/sales-portal sales-portal=${{ env.ECR_REGISTRY }}/elevatedpos/sales-portal:${{ github.sha }} -n elevatedpos

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/orders -n elevatedpos --timeout=5m
          kubectl rollout status deployment/payments -n elevatedpos --timeout=5m
          kubectl rollout status deployment/web-backoffice -n elevatedpos --timeout=5m

  # ── Deploy to Production ──────────────────────────────────────────────────
  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: prod
    if: always() && inputs.environment == 'prod' && needs.deploy-staging.result != 'cancelled'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name elevatedpos-prod --region ${{ env.AWS_REGION }}

      - name: Replace ACCOUNT_ID in manifests
        run: |
          find infrastructure/k8s -name "*.yaml" -exec \
            sed -i "s/ACCOUNT_ID/${{ secrets.AWS_ACCOUNT_ID }}/g" {} +

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f infrastructure/k8s/namespace.yaml
          kubectl apply -f infrastructure/k8s/serviceaccount.yaml
          kubectl apply -f infrastructure/k8s/configmap.yaml
          kubectl apply -f infrastructure/k8s/services/
          # Force-recreate portal services that were previously created without kubectl apply
          kubectl delete service godmode org-portal reseller-portal -n elevatedpos --ignore-not-found=true
          kubectl apply -f infrastructure/k8s/apps/
          # Remove any pre-existing portal ingresses that may conflict with portals-ingress.yaml
          kubectl delete ingress \
            elevatedpos-org-portal-ingress \
            elevatedpos-reseller-portal-ingress \
            elevatedpos-godmode-ingress \
            elevatedpos-portals-ingress \
            -n elevatedpos --ignore-not-found=true
          # infrastructure/k8s/ingress.yaml hosts are managed by Helm; skipped to avoid conflicts
          kubectl apply -f infrastructure/k8s/ingress/

      - name: Run database migrations
        run: |
          # Use any reliably running pod to apply SQL migrations directly
          # Find a stable pod (catalog tends to be reliable)
          RELAY_POD=""
          for SVC in catalog loyalty orders payments customers; do
            P=$(kubectl get pods -n elevatedpos -l app=$SVC --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "$P" ]; then RELAY_POD=$P; RELAY_SVC=$SVC; break; fi
          done
          echo "Relay pod: $RELAY_POD ($RELAY_SVC)"

          # -- Auth migration 0008: email verification columns --
          if [ -n "$RELAY_POD" ]; then
            kubectl exec -n elevatedpos "$RELAY_POD" -- node -e "
              const {Pool}=require('pg');
              const p=new Pool({connectionString:process.env.DATABASE_URL,ssl:{rejectUnauthorized:false}});
              p.query('ALTER TABLE employees ADD COLUMN IF NOT EXISTS email_verified boolean NOT NULL DEFAULT false, ADD COLUMN IF NOT EXISTS email_verification_token varchar(255), ADD COLUMN IF NOT EXISTS email_verification_expires_at timestamptz')
                .then(()=>{console.log('auth 0008: applied');p.end();})
                .catch(e=>{console.error('auth 0008:',e.message);p.end();process.exit(0);});
            " && echo "auth 0008 OK" || echo "auth 0008 WARN"
          fi

          # -- Auth migration 0009: password reset columns --
          if [ -n "$RELAY_POD" ]; then
            kubectl exec -n elevatedpos "$RELAY_POD" -- node -e "
              const {Pool}=require('pg');
              const p=new Pool({connectionString:process.env.DATABASE_URL,ssl:{rejectUnauthorized:false}});
              p.query('ALTER TABLE employees ADD COLUMN IF NOT EXISTS password_reset_token varchar(255), ADD COLUMN IF NOT EXISTS password_reset_expires_at timestamptz')
                .then(()=>{console.log('auth 0009: applied');p.end();})
                .catch(e=>{console.error('auth 0009:',e.message);p.end();process.exit(0);});
            " && echo "auth 0009 OK" || echo "auth 0009 WARN"
          fi

          # -- Auth migration 0010: printers table --
          if [ -n "$RELAY_POD" ]; then
            kubectl exec -n elevatedpos "$RELAY_POD" -- node -e "
              const {Pool}=require('pg');
              const p=new Pool({connectionString:process.env.DATABASE_URL,ssl:{rejectUnauthorized:false}});
              p.query(\`
                DO \\\$\\\$ BEGIN CREATE TYPE printer_connection_type AS ENUM ('ip','usb'); EXCEPTION WHEN duplicate_object THEN NULL; END \\\$\\\$;
                DO \\\$\\\$ BEGIN CREATE TYPE printer_type AS ENUM ('receipt','kitchen_order'); EXCEPTION WHEN duplicate_object THEN NULL; END \\\$\\\$;
                DO \\\$\\\$ BEGIN CREATE TYPE printer_destination_type AS ENUM ('none','kitchen','bar','front','back','custom'); EXCEPTION WHEN duplicate_object THEN NULL; END \\\$\\\$;
                CREATE TABLE IF NOT EXISTS printers (id uuid PRIMARY KEY DEFAULT gen_random_uuid(), org_id uuid NOT NULL REFERENCES organisations(id) ON DELETE CASCADE, location_id uuid NOT NULL REFERENCES locations(id) ON DELETE CASCADE, name varchar(100) NOT NULL, brand varchar(50) NOT NULL DEFAULT 'generic', connection_type printer_connection_type NOT NULL DEFAULT 'ip', host varchar(255), port integer DEFAULT 9100, printer_type printer_type NOT NULL DEFAULT 'receipt', destination printer_destination_type NOT NULL DEFAULT 'none', custom_destination varchar(100), is_active boolean NOT NULL DEFAULT true, created_at timestamptz NOT NULL DEFAULT now(), updated_at timestamptz NOT NULL DEFAULT now())
              \`)
                .then(()=>{console.log('auth 0010: applied');p.end();})
                .catch(e=>{console.error('auth 0010:',e.message);p.end();process.exit(0);});
            " && echo "auth 0010 OK" || echo "auth 0010 WARN"
          fi

          # -- Auth migration 0011: plans, signup_links, support_notes, audit_logs, sales_agent role --
          if [ -n "$RELAY_POD" ]; then
            kubectl exec -n elevatedpos "$RELAY_POD" -- node -e "
              const {Pool}=require('pg');
              const p=new Pool({connectionString:process.env.DATABASE_URL,ssl:{rejectUnauthorized:false}});
              const sqls=[
                \`ALTER TYPE platform_role ADD VALUE IF NOT EXISTS 'sales_agent'\`,
                \`CREATE TABLE IF NOT EXISTS plans (
                  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
                  name varchar(100) NOT NULL,
                  slug varchar(100) NOT NULL UNIQUE,
                  description text,
                  monthly_price numeric(10,2) NOT NULL,
                  annual_price numeric(10,2),
                  features jsonb NOT NULL DEFAULT '[]',
                  is_public boolean NOT NULL DEFAULT true,
                  is_active boolean NOT NULL DEFAULT true,
                  max_locations integer NOT NULL DEFAULT 1,
                  max_employees integer NOT NULL DEFAULT 50,
                  max_products integer NOT NULL DEFAULT 1000,
                  trial_days integer NOT NULL DEFAULT 14,
                  sort_order integer NOT NULL DEFAULT 0,
                  created_at timestamptz NOT NULL DEFAULT now(),
                  updated_at timestamptz NOT NULL DEFAULT now()
                )\`,
                \`CREATE TABLE IF NOT EXISTS signup_links (
                  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
                  code varchar(50) NOT NULL UNIQUE,
                  created_by_platform_user_id uuid REFERENCES platform_staff(id),
                  sales_agent_id uuid REFERENCES platform_staff(id),
                  plan_id uuid REFERENCES plans(id),
                  org_name varchar(200),
                  custom_monthly_price numeric(10,2),
                  custom_annual_price numeric(10,2),
                  custom_trial_days integer,
                  note text,
                  expires_at timestamptz,
                  used_at timestamptz,
                  used_by_org_id uuid,
                  is_active boolean NOT NULL DEFAULT true,
                  created_at timestamptz NOT NULL DEFAULT now(),
                  updated_at timestamptz NOT NULL DEFAULT now()
                )\`,
                \`CREATE TABLE IF NOT EXISTS support_notes (
                  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
                  org_id uuid NOT NULL,
                  author_id uuid NOT NULL REFERENCES platform_staff(id),
                  author_name varchar(200) NOT NULL,
                  body text NOT NULL,
                  created_at timestamptz NOT NULL DEFAULT now(),
                  updated_at timestamptz NOT NULL DEFAULT now()
                )\`,
                \`CREATE TABLE IF NOT EXISTS audit_logs (
                  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
                  org_id uuid,
                  platform_user_id uuid,
                  actor_name varchar(200),
                  action varchar(100) NOT NULL,
                  resource_type varchar(100) NOT NULL,
                  resource_id varchar(200),
                  detail jsonb,
                  ip_address varchar(45),
                  created_at timestamptz NOT NULL DEFAULT now()
                )\`
              ];
              (async()=>{
                for(const s of sqls){
                  try{await p.query(s);}catch(e){console.error('auth 0011 step:',e.message);}
                }
                console.log('auth 0011: applied');
                p.end();
              })();
            " && echo "auth 0011 OK" || echo "auth 0011 WARN"
          fi

          # -- Catalog migration 0006: inventory enhancements --
          if [ -n "$RELAY_POD" ]; then
            kubectl exec -n elevatedpos "$RELAY_POD" -- node -e "
              const {Pool}=require('pg');
              const p=new Pool({connectionString:process.env.DATABASE_URL,ssl:{rejectUnauthorized:false}});
              const sqls=[
                'ALTER TABLE categories ADD COLUMN IF NOT EXISTS printer_destination varchar(20)',
                'ALTER TABLE categories ADD COLUMN IF NOT EXISTS kds_destination varchar(20)',
                'ALTER TABLE categories ADD COLUMN IF NOT EXISTS custom_printer_name varchar(100)',
                'ALTER TABLE categories ADD COLUMN IF NOT EXISTS custom_kds_name varchar(100)',
                'ALTER TABLE categories ADD COLUMN IF NOT EXISTS color varchar(20)',
                'ALTER TABLE products ADD COLUMN IF NOT EXISTS show_on_kiosk boolean NOT NULL DEFAULT true',
                'ALTER TABLE products ADD COLUMN IF NOT EXISTS dimensions jsonb NOT NULL DEFAULT \'{}\'',
                'ALTER TABLE products ADD COLUMN IF NOT EXISTS allergens text[] NOT NULL DEFAULT \'{}\'',
                'ALTER TABLE products ADD COLUMN IF NOT EXISTS prep_time_minutes integer',
                'ALTER TABLE products ADD COLUMN IF NOT EXISTS calories integer',
                'ALTER TABLE products ADD COLUMN IF NOT EXISTS is_countdown boolean NOT NULL DEFAULT false',
                'ALTER TABLE products ADD COLUMN IF NOT EXISTS countdown_qty integer',
                'ALTER TABLE products ADD COLUMN IF NOT EXISTS kitchen_display_name varchar(255)',
                'CREATE TABLE IF NOT EXISTS product_variant_groups (id uuid PRIMARY KEY DEFAULT gen_random_uuid(), product_id uuid NOT NULL, name varchar(255) NOT NULL, is_required boolean NOT NULL DEFAULT false, is_root boolean NOT NULL DEFAULT true, sort_order integer NOT NULL DEFAULT 0, created_at timestamptz NOT NULL DEFAULT now())',
                'CREATE TABLE IF NOT EXISTS product_variant_options (id uuid PRIMARY KEY DEFAULT gen_random_uuid(), group_id uuid NOT NULL, name varchar(255) NOT NULL, price_modifier numeric(10,2) NOT NULL DEFAULT 0, sort_order integer NOT NULL DEFAULT 0, created_at timestamptz NOT NULL DEFAULT now())',
                'CREATE TABLE IF NOT EXISTS product_variant_rules (id uuid PRIMARY KEY DEFAULT gen_random_uuid(), parent_option_id uuid NOT NULL, child_group_id uuid NOT NULL, created_at timestamptz NOT NULL DEFAULT now())'
              ];
              const p=new Pool({connectionString:process.env.DATABASE_URL,ssl:{rejectUnauthorized:false}});
              (async()=>{for(const s of sqls){try{await p.query(s);}catch(e){console.error('catalog 0006 step:',e.message);}}console.log('catalog 0006: applied');p.end();})();
            " && echo "catalog 0006 OK" || echo "catalog 0006 WARN"
          fi

          # -- Orders migration: kds_destination on order_lines --
          if [ -n "$RELAY_POD" ]; then
            kubectl exec -n elevatedpos "$RELAY_POD" -- node -e "
              const {Pool}=require('pg');
              const p=new Pool({connectionString:process.env.DATABASE_URL,ssl:{rejectUnauthorized:false}});
              p.query('ALTER TABLE order_lines ADD COLUMN IF NOT EXISTS kds_destination varchar(50)')
                .then(()=>{console.log('orders kds_destination: applied');p.end();})
                .catch(e=>{console.error('orders kds_destination:',e.message);p.end();process.exit(0);});
            " && echo "orders kds_destination OK" || echo "orders kds_destination WARN"
          fi

          # -- Drizzle migrator for remaining services --
          MIGRATE_SCRIPT='const {Pool}=require("pg");const {drizzle}=require("drizzle-orm/node-postgres");const {migrate}=require("drizzle-orm/node-postgres/migrator");const p=new Pool({connectionString:process.env.DATABASE_URL,ssl:{rejectUnauthorized:false}});const d=drizzle(p);migrate(d,{migrationsFolder:"src/db/migrations",migrationsTable:"__drizzle_migrations"}).then(()=>{console.log("migrations applied");p.end();process.exit(0);}).catch(e=>{console.error(e.message);p.end();process.exit(1);});'
          for SVC in auth inventory orders payments customers loyalty campaigns notifications integrations automations franchise webhooks; do
            POD=$(kubectl get pods -n elevatedpos -l app=$SVC --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "$POD" ]; then
              kubectl exec -n elevatedpos "$POD" -- node -e "$MIGRATE_SCRIPT" \
                && echo "$SVC: OK" || echo "$SVC: WARN"
            fi
          done

      - name: Update image tags
        run: |
          SERVICES="auth catalog inventory orders payments customers loyalty campaigns notifications integrations automations ai hardware-bridge franchise reporting webhooks"
          for SVC in $SERVICES; do
            kubectl set image deployment/$SVC $SVC=${{ env.ECR_REGISTRY }}/elevatedpos/$SVC:${{ github.sha }} -n elevatedpos
          done
          kubectl set image deployment/web-backoffice web-backoffice=${{ env.ECR_REGISTRY }}/elevatedpos/web-backoffice:${{ github.sha }} -n elevatedpos
          kubectl set image deployment/kds-display kds-display=${{ env.ECR_REGISTRY }}/elevatedpos/kds-display:${{ github.sha }} -n elevatedpos
          kubectl set image deployment/storefront storefront=${{ env.ECR_REGISTRY }}/elevatedpos/storefront:${{ github.sha }} -n elevatedpos
          kubectl set image deployment/pay pay=${{ env.ECR_REGISTRY }}/elevatedpos/pay:${{ github.sha }} -n elevatedpos
          kubectl set image deployment/org-portal org-portal=${{ env.ECR_REGISTRY }}/elevatedpos/org-portal:${{ github.sha }} -n elevatedpos
          kubectl set image deployment/reseller-portal reseller-portal=${{ env.ECR_REGISTRY }}/elevatedpos/reseller-portal:${{ github.sha }} -n elevatedpos
          kubectl set image deployment/godmode godmode=${{ env.ECR_REGISTRY }}/elevatedpos/godmode:${{ github.sha }} -n elevatedpos
          kubectl set image deployment/sales-portal sales-portal=${{ env.ECR_REGISTRY }}/elevatedpos/sales-portal:${{ github.sha }} -n elevatedpos

      - name: Wait for production rollout
        run: |
          for SVC in auth catalog orders payments web-backoffice; do
            kubectl rollout status deployment/$SVC -n elevatedpos --timeout=10m \
              && echo "$SVC: rolled out" \
              || echo "$SVC: WARN rollout timeout (old pods still serving)"
          done
