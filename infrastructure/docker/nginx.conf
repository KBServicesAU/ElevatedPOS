user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    client_max_body_size  50m;

    # ─── Gzip ─────────────────────────────────────────────────────────────────
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ─── Proxy defaults ───────────────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        Connection        "";
    proxy_connect_timeout   60s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;
    proxy_buffering         on;
    proxy_buffer_size       4k;
    proxy_buffers           8 4k;

    # ─── Upstreams ────────────────────────────────────────────────────────────
    upstream auth_upstream {
        server auth:4001;
        keepalive 32;
    }

    upstream catalog_upstream {
        server catalog:4002;
        keepalive 32;
    }

    upstream inventory_upstream {
        server inventory:4003;
        keepalive 32;
    }

    upstream orders_upstream {
        server orders:4004;
        keepalive 32;
    }

    upstream payments_upstream {
        server payments:4005;
        keepalive 32;
    }

    upstream customers_upstream {
        server customers:4006;
        keepalive 32;
    }

    upstream loyalty_upstream {
        server loyalty:4007;
        keepalive 32;
    }

    upstream campaigns_upstream {
        server campaigns:4008;
        keepalive 32;
    }

    upstream notifications_upstream {
        server notifications:4009;
        keepalive 32;
    }

    upstream integrations_upstream {
        server integrations:4010;
        keepalive 32;
    }

    upstream automations_upstream {
        server automations:4011;
        keepalive 32;
    }

    upstream ai_upstream {
        server ai:4012;
        keepalive 32;
    }

    upstream franchise_upstream {
        server franchise:4013;
        keepalive 32;
    }

    upstream reporting_upstream {
        server reporting:4014;
        keepalive 32;
    }

    upstream webhooks_upstream {
        server webhooks:4015;
        keepalive 32;
    }

    upstream web_backoffice_upstream {
        server web-backoffice:3000;
        keepalive 32;
    }

    upstream kds_display_upstream {
        server kds-display:3001;
        keepalive 32;
    }

    # ─── Server ───────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check endpoint for load balancers
        location = /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ─── API Routes ───────────────────────────────────────────────────────

        location /api/v1/auth {
            proxy_pass http://auth_upstream;
        }

        location /api/v1/catalog {
            proxy_pass http://catalog_upstream;
        }

        location /api/v1/inventory {
            proxy_pass http://inventory_upstream;
        }

        location /api/v1/orders {
            proxy_pass http://orders_upstream;
        }

        location /api/v1/payments {
            proxy_pass http://payments_upstream;
        }

        location /api/v1/customers {
            proxy_pass http://customers_upstream;
        }

        location /api/v1/loyalty {
            proxy_pass http://loyalty_upstream;
        }

        location /api/v1/campaigns {
            proxy_pass http://campaigns_upstream;
        }

        location /api/v1/notifications {
            proxy_pass http://notifications_upstream;
        }

        location /api/v1/integrations {
            proxy_pass http://integrations_upstream;
        }

        location /api/v1/automations {
            proxy_pass http://automations_upstream;
        }

        location /api/v1/ai {
            proxy_pass http://ai_upstream;
        }

        location /api/v1/franchise {
            proxy_pass http://franchise_upstream;
        }

        location /api/v1/reports {
            proxy_pass http://reporting_upstream;
        }

        location /api/v1/webhooks {
            proxy_pass http://webhooks_upstream;
        }

        # KDS display app
        location /kds {
            proxy_pass http://kds_display_upstream;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Web backoffice (catch-all)
        location / {
            proxy_pass http://web_backoffice_upstream;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
