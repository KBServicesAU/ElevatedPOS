apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-api-ingress
  namespace: nexus
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: "/health"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
spec:
  rules:
    - host: api.nexuspos.app
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 4001
          - path: /api/v1/catalog
            pathType: Prefix
            backend:
              service:
                name: catalog
                port:
                  number: 4002
          - path: /api/v1/inventory
            pathType: Prefix
            backend:
              service:
                name: inventory
                port:
                  number: 4003
          - path: /api/v1/orders
            pathType: Prefix
            backend:
              service:
                name: orders
                port:
                  number: 4004
          - path: /api/v1/payments
            pathType: Prefix
            backend:
              service:
                name: payments
                port:
                  number: 4005
          - path: /api/v1/customers
            pathType: Prefix
            backend:
              service:
                name: customers
                port:
                  number: 4006
          - path: /api/v1/loyalty
            pathType: Prefix
            backend:
              service:
                name: loyalty
                port:
                  number: 4007
          - path: /api/v1/campaigns
            pathType: Prefix
            backend:
              service:
                name: campaigns
                port:
                  number: 4008
          - path: /api/v1/notifications
            pathType: Prefix
            backend:
              service:
                name: notifications
                port:
                  number: 4009
          - path: /api/v1/integrations
            pathType: Prefix
            backend:
              service:
                name: integrations
                port:
                  number: 4010
          - path: /api/v1/automations
            pathType: Prefix
            backend:
              service:
                name: automations
                port:
                  number: 4011
          - path: /api/v1/ai
            pathType: Prefix
            backend:
              service:
                name: ai
                port:
                  number: 4012
    - host: nexuspos.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-backoffice
                port:
                  number: 3000
    - host: kds.nexuspos.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kds-display
                port:
                  number: 3001
