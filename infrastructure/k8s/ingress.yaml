apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elevatedpos-api-ingress
  namespace: elevatedpos
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    # ── Marketing site & onboarding (elevatedpos.com.au + www) ──────────────
    - host: elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storefront
                port:
                  number: 3002
    - host: www.elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storefront
                port:
                  number: 3002
    # ── Online ordering storefront (shop.elevatedpos.com.au) ─────────────────
    - host: shop.elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storefront
                port:
                  number: 3002
    # ── Backoffice + API (app.elevatedpos.com.au + bare domain) ─────────────
    - host: app.elevatedpos.com.au
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 4001
          - path: /api/v1/catalog
            pathType: Prefix
            backend:
              service:
                name: catalog
                port:
                  number: 4002
          - path: /api/v1/inventory
            pathType: Prefix
            backend:
              service:
                name: inventory
                port:
                  number: 4003
          - path: /api/v1/orders
            pathType: Prefix
            backend:
              service:
                name: orders
                port:
                  number: 4004
          - path: /api/v1/payments
            pathType: Prefix
            backend:
              service:
                name: payments
                port:
                  number: 4005
          - path: /api/v1/customers
            pathType: Prefix
            backend:
              service:
                name: customers
                port:
                  number: 4006
          - path: /api/v1/loyalty
            pathType: Prefix
            backend:
              service:
                name: loyalty
                port:
                  number: 4007
          - path: /api/v1/campaigns
            pathType: Prefix
            backend:
              service:
                name: campaigns
                port:
                  number: 4008
          - path: /api/v1/notifications
            pathType: Prefix
            backend:
              service:
                name: notifications
                port:
                  number: 4009
          - path: /api/v1/integrations
            pathType: Prefix
            backend:
              service:
                name: integrations
                port:
                  number: 4010
          - path: /api/v1/automations
            pathType: Prefix
            backend:
              service:
                name: automations
                port:
                  number: 4011
          - path: /api/v1/ai
            pathType: Prefix
            backend:
              service:
                name: ai
                port:
                  number: 4012
          - path: /api/v1/franchise
            pathType: Prefix
            backend:
              service:
                name: franchise
                port:
                  number: 4013
          - path: /api/v1/reports
            pathType: Prefix
            backend:
              service:
                name: reporting
                port:
                  number: 4014
          - path: /api/v1/webhooks
            pathType: Prefix
            backend:
              service:
                name: webhooks
                port:
                  number: 4015
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-backoffice
                port:
                  number: 3000
