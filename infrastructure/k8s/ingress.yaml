apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elevatedpos-api-ingress
  namespace: elevatedpos
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # v2.7.40 — previously both read/send timeouts were 60s, which killed
    # long-lived WebSocket connections (POS → KDS live broadcast, kiosk
    # display stream, etc.) after 60s of idle with no message, forcing
    # the client into a reconnect loop and silently dropping any order
    # that arrived during the reconnect gap. Bumped to 3600s. ingress-nginx
    # supports WebSocket upgrades natively (Connection/Upgrade headers are
    # forwarded automatically), so the only pin we need to raise is the
    # idle timeout. If you need finer-grained control, move WS paths to
    # a separate Ingress with their own annotations.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - elevatedpos.com.au
        - www.elevatedpos.com.au
      secretName: elevatedpos-root-tls
    - hosts:
        - shop.elevatedpos.com.au
      secretName: elevatedpos-shop-tls
    - hosts:
        - app.elevatedpos.com.au
      secretName: elevatedpos-app-tls
  rules:
    # ── Marketing site & onboarding (elevatedpos.com.au + www) ──────────────
    - host: elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storefront
                port:
                  number: 3002
    - host: www.elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storefront
                port:
                  number: 3002
    # ── Online ordering storefront (shop.elevatedpos.com.au) ─────────────────
    - host: shop.elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storefront
                port:
                  number: 3002
    # ── Backoffice + API (app.elevatedpos.com.au + bare domain) ─────────────
    - host: app.elevatedpos.com.au
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 4001
          - path: /api/v1/devices
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 4001
          - path: /api/v1/employees
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 4001
          - path: /api/v1/locations
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 4001
          - path: /api/v1/organisations
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 4001
          # v2.7.36 — display management routes (display/screens,
          # display/screens/:id/content, display/content) are served
          # by the auth service. Missing from the ingress before this
          # release, which is why /dashboard/display showed
          # "No display screens" even when a display was paired.
          - path: /api/v1/display
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 4001
          - path: /api/v1/catalog
            pathType: Prefix
            backend:
              service:
                name: catalog
                port:
                  number: 4002
          - path: /api/v1/inventory
            pathType: Prefix
            backend:
              service:
                name: inventory
                port:
                  number: 4003
          - path: /api/v1/orders
            pathType: Prefix
            backend:
              service:
                name: orders
                port:
                  number: 4004
          - path: /api/v1/kds
            pathType: Prefix
            backend:
              service:
                name: orders
                port:
                  number: 4004
          - path: /api/v1/payments
            pathType: Prefix
            backend:
              service:
                name: payments
                port:
                  number: 4005
          - path: /api/v1/stripe
            pathType: Prefix
            backend:
              service:
                name: payments
                port:
                  number: 4005
          - path: /api/v1/customers
            pathType: Prefix
            backend:
              service:
                name: customers
                port:
                  number: 4006
          - path: /api/v1/loyalty
            pathType: Prefix
            backend:
              service:
                name: loyalty
                port:
                  number: 4007
          - path: /api/v1/campaigns
            pathType: Prefix
            backend:
              service:
                name: campaigns
                port:
                  number: 4008
          - path: /api/v1/notifications
            pathType: Prefix
            backend:
              service:
                name: notifications
                port:
                  number: 4009
          - path: /api/v1/integrations
            pathType: Prefix
            backend:
              service:
                name: integrations
                port:
                  number: 4010
          - path: /api/v1/automations
            pathType: Prefix
            backend:
              service:
                name: automations
                port:
                  number: 4011
          - path: /api/v1/ai
            pathType: Prefix
            backend:
              service:
                name: ai
                port:
                  number: 4012
          - path: /api/v1/franchise
            pathType: Prefix
            backend:
              service:
                name: franchise
                port:
                  number: 4013
          - path: /api/v1/reports
            pathType: Prefix
            backend:
              service:
                name: reporting
                port:
                  number: 4014
          - path: /api/v1/webhooks
            pathType: Prefix
            backend:
              service:
                name: webhooks
                port:
                  number: 4015
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-backoffice
                port:
                  number: 3000
