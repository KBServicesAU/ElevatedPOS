apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elevatedpos-portals-ingress
  namespace: elevatedpos
  labels:
    app.kubernetes.io/name: elevatedpos
    app.kubernetes.io/part-of: elevatedpos
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - organisation.elevatedpos.com.au
      secretName: elevatedpos-organisation-tls
    - hosts:
        - reseller.elevatedpos.com.au
      secretName: elevatedpos-reseller-tls
    - hosts:
        - godmode.elevatedpos.com.au
      secretName: elevatedpos-godmode-tls
    - hosts:
        - epsales.elevatedpos.com.au
      secretName: elevatedpos-sales-portal-tls
    - hosts:
        - partners.elevatedpos.com.au
      secretName: elevatedpos-partner-portal-tls
    - hosts:
        - developers.elevatedpos.com.au
      secretName: elevatedpos-developer-portal-tls
    - hosts:
        - kds.elevatedpos.com.au
      secretName: elevatedpos-kds-tls
  rules:
    - host: organisation.elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: org-portal
                port:
                  number: 3011
    - host: reseller.elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: reseller-portal
                port:
                  number: 3012
    - host: godmode.elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: godmode
                port:
                  number: 3010
    - host: epsales.elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sales-portal
                port:
                  number: 53113
    - host: partners.elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: partner-portal
                port:
                  number: 3020
    - host: developers.elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: developer-portal
                port:
                  number: 3021
    - host: kds.elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kds-display
                port:
                  number: 3001
