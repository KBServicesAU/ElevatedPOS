apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elevatedpos-portals-ingress
  namespace: elevatedpos
  labels:
    app.kubernetes.io/name: elevatedpos
    app.kubernetes.io/part-of: elevatedpos
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - support.elevatedpos.com.au
      secretName: elevatedpos-support-tls
    - hosts:
        - reseller.elevatedpos.com.au
      secretName: elevatedpos-reseller-tls
    - hosts:
        - admin.elevatedpos.com.au
      secretName: elevatedpos-admin-tls
  rules:
    - host: support.elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: org-portal
                port:
                  number: 3000
    - host: reseller.elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: reseller-portal
                port:
                  number: 3000
    - host: admin.elevatedpos.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: godmode
                port:
                  number: 3000
