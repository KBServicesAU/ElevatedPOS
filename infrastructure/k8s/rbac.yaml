apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexus-app
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nexus-role
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nexus-rolebinding
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus
subjects:
  - kind: ServiceAccount
    name: nexus-app
    namespace: nexus
roleRef:
  kind: Role
  name: nexus-role
  apiGroup: rbac.authorization.k8s.io
