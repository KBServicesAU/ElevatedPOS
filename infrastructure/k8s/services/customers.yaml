apiVersion: apps/v1
kind: Deployment
metadata:
  name: customers
  namespace: nexus
  labels:
    app: customers
    app.kubernetes.io/part-of: nexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customers
  template:
    metadata:
      labels:
        app: customers
    spec:
      serviceAccountName: nexus-service
      containers:
        - name: customers
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/nexus/customers:latest
          ports:
            - containerPort: 4006
          envFrom:
            - configMapRef:
                name: nexus-config
            - secretRef:
                name: nexus-secrets
          env:
            - name: PORT
              value: "4006"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 4006
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4006
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: customers
  namespace: nexus
spec:
  selector:
    app: customers
  ports:
    - port: 4006
      targetPort: 4006
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: customers
  namespace: nexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: customers
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
