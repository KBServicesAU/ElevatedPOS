apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting
  namespace: nexus
  labels:
    app: reporting
    app.kubernetes.io/part-of: nexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reporting
  template:
    metadata:
      labels:
        app: reporting
    spec:
      serviceAccountName: nexus-service
      containers:
        - name: reporting
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/nexus/reporting:latest
          ports:
            - containerPort: 4014
          envFrom:
            - configMapRef:
                name: nexus-config
            - secretRef:
                name: nexus-secrets
          env:
            - name: PORT
              value: "4014"
            - name: CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: nexus-config
                  key: CLICKHOUSE_HOST
            - name: CLICKHOUSE_PORT
              valueFrom:
                configMapKeyRef:
                  name: nexus-config
                  key: CLICKHOUSE_PORT
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 4014
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4014
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: reporting
  namespace: nexus
spec:
  type: ClusterIP
  selector:
    app: reporting
  ports:
    - port: 4014
      targetPort: 4014
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reporting
  namespace: nexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reporting
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
