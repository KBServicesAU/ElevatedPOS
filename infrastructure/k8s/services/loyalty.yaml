apiVersion: apps/v1
kind: Deployment
metadata:
  name: loyalty
  namespace: elevatedpos
  labels:
    app: loyalty
    app.kubernetes.io/part-of: elevatedpos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loyalty
  template:
    metadata:
      labels:
        app: loyalty
    spec:
      serviceAccountName: elevatedpos-service
      containers:
        - name: loyalty
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/loyalty:latest
          ports:
            - containerPort: 4007
          envFrom:
            - configMapRef:
                name: elevatedpos-config
            - secretRef:
                name: elevatedpos-secrets
          env:
            - name: PORT
              value: "4007"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 4007
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4007
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: loyalty
  namespace: elevatedpos
spec:
  selector:
    app: loyalty
  ports:
    - port: 4007
      targetPort: 4007
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: loyalty
  namespace: elevatedpos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: loyalty
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
