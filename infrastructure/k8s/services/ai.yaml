apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai
  namespace: nexus
  labels:
    app: ai
    app.kubernetes.io/part-of: nexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai
  template:
    metadata:
      labels:
        app: ai
    spec:
      serviceAccountName: nexus-service
      containers:
        - name: ai
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/nexus/ai:latest
          ports:
            - containerPort: 4012
          envFrom:
            - configMapRef:
                name: nexus-config
            - secretRef:
                name: nexus-secrets
          env:
            - name: PORT
              value: "4012"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 4012
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4012
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ai
  namespace: nexus
spec:
  selector:
    app: ai
  ports:
    - port: 4012
      targetPort: 4012
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai
  namespace: nexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
