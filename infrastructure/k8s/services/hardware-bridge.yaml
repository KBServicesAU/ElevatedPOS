apiVersion: apps/v1
kind: Deployment
metadata:
  name: hardware-bridge
  namespace: elevatedpos
  labels:
    app: hardware-bridge
    app.kubernetes.io/part-of: elevatedpos
spec:
  # Hardware bridge runs as a single DaemonSet-like process per store location
  # In cloud this is a gateway/proxy; actual hardware comms happen on-premise
  replicas: 1
  selector:
    matchLabels:
      app: hardware-bridge
  template:
    metadata:
      labels:
        app: hardware-bridge
    spec:
      serviceAccountName: elevatedpos-service
      containers:
        - name: hardware-bridge
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/hardware-bridge:latest
          ports:
            - containerPort: 9999
          envFrom:
            - configMapRef:
                name: elevatedpos-config
            - secretRef:
                name: elevatedpos-secrets
          env:
            - name: PORT
              value: "9999"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: hardware-bridge
  namespace: elevatedpos
spec:
  selector:
    app: hardware-bridge
  ports:
    - port: 9999
      targetPort: 9999
