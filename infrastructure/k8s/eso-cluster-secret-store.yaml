# ─────────────────────────────────────────────────────────────────────────────
# External Secrets Operator — ClusterSecretStore (v2.7.62)
# ─────────────────────────────────────────────────────────────────────────────
#
# DO NOT APPLY until ESO is installed (see infrastructure/RUNBOOKS/02-...md).
# The CRD `clustersecretstores.external-secrets.io` doesn't exist on the
# cluster until `helm install external-secrets external-secrets/external-secrets`
# completes; applying before that fails with `no matches for kind`.
#
# This file is checked in early so the cutover is just two `kubectl apply`s
# rather than the merchant having to draft the manifest under pressure.

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-2
      auth:
        # ESO authenticates as the IRSA-bound service account in the
        # external-secrets namespace. The IAM role is defined in
        # infrastructure/terraform/eso.tf as aws_iam_role.external_secrets;
        # its ARN is the `external_secrets_role_arn` terraform output.
        # Annotate the ESO ServiceAccount with that ARN at install time
        # via Helm: `--set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=<arn>`
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
