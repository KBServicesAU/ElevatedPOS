apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexus-service
  namespace: nexus
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/nexus-service-prod
---
apiVersion: v1
kind: Secret
metadata:
  name: nexus-secrets
  namespace: nexus
type: Opaque
# Secrets are managed via AWS Secrets Manager and injected at deploy time.
# Use the following command to sync secrets before deploying:
#   kubectl create secret generic nexus-secrets \
#     --from-literal=DATABASE_URL="..." \
#     --from-literal=REDIS_URL="..." \
#     --from-literal=JWT_SECRET="..." \
#     --from-literal=ANTHROPIC_API_KEY="..." \
#     -n nexus --dry-run=client -o yaml | kubectl apply -f -
