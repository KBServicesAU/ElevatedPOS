apiVersion: v1
kind: ServiceAccount
metadata:
  name: elevatedpos-service
  namespace: elevatedpos
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/elevatedpos-service-prod
---
apiVersion: v1
kind: Secret
metadata:
  name: elevatedpos-secrets
  namespace: elevatedpos
type: Opaque
# Secrets are managed via AWS Secrets Manager and injected at deploy time.
# Use the following command to sync secrets before deploying:
#   kubectl create secret generic elevatedpos-secrets \
#     --from-literal=DATABASE_URL="..." \
#     --from-literal=REDIS_URL="..." \
#     --from-literal=JWT_SECRET="..." \
#     --from-literal=ANTHROPIC_API_KEY="..." \
#     -n elevatedpos --dry-run=client -o yaml | kubectl apply -f -
