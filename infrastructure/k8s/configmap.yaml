apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-config
  namespace: nexus
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  TYPESENSE_HOST: "typesense.nexus.svc.cluster.local"
  # Service discovery URLs (internal cluster DNS)
  AUTH_SERVICE_URL: "http://auth:4001"
  CATALOG_SERVICE_URL: "http://catalog:4002"
  INVENTORY_SERVICE_URL: "http://inventory:4003"
  ORDERS_SERVICE_URL: "http://orders:4004"
  PAYMENTS_SERVICE_URL: "http://payments:4005"
  CUSTOMERS_SERVICE_URL: "http://customers:4006"
  LOYALTY_SERVICE_URL: "http://loyalty:4007"
  CAMPAIGNS_SERVICE_URL: "http://campaigns:4008"
  NOTIFICATIONS_SERVICE_URL: "http://notifications:4009"
  INTEGRATIONS_SERVICE_URL: "http://integrations:4010"
  AUTOMATIONS_SERVICE_URL: "http://automations:4011"
  AI_SERVICE_URL: "http://ai:4012"
  FRANCHISE_SERVICE_URL: "http://franchise:4013"
  REPORTING_SERVICE_URL: "http://reporting:4014"
  WEBHOOKS_SERVICE_URL: "http://webhooks:4015"
  REDIS_URL: "redis://redis:6379"
  CLICKHOUSE_HOST: "clickhouse.nexus.svc.cluster.local"
  CLICKHOUSE_PORT: "8123"
  # Set to "true" on environments with Stripe test keys but no physical
  # Terminal hardware (e.g. staging). Production should be "false".
  STRIPE_TERMINAL_SIMULATED: "false"
