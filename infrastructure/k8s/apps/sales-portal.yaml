apiVersion: apps/v1
kind: Deployment
metadata:
  name: sales-portal
  namespace: elevatedpos
  labels:
    app: sales-portal
    app.kubernetes.io/part-of: elevatedpos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sales-portal
  template:
    metadata:
      labels:
        app: sales-portal
    spec:
      serviceAccountName: elevatedpos-service
      containers:
        - name: sales-portal
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/sales-portal:latest
          ports:
            - containerPort: 53113
          envFrom:
            - configMapRef:
                name: elevatedpos-config
            - secretRef:
                name: elevatedpos-secrets
          env:
            - name: PORT
              value: "53113"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 53113
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 53113
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: sales-portal
  namespace: elevatedpos
spec:
  selector:
    app: sales-portal
  ports:
    - name: http
      port: 53113
      targetPort: 53113
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sales-portal
  namespace: elevatedpos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sales-portal
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
