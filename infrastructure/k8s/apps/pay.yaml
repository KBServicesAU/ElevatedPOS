apiVersion: apps/v1
kind: Deployment
metadata:
  name: pay
  namespace: elevatedpos
  labels:
    app: pay
    app.kubernetes.io/part-of: elevatedpos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pay
  template:
    metadata:
      labels:
        app: pay
    spec:
      serviceAccountName: elevatedpos-service
      containers:
        - name: pay
          image: 643603453013.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/pay:latest
          ports:
            - containerPort: 3005
          envFrom:
            - configMapRef:
                name: elevatedpos-config
            - secretRef:
                name: elevatedpos-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3005"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: INTEGRATIONS_API_URL
              value: "http://integrations:4010"
            - name: AUTH_API_URL
              value: "http://auth:4001"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3005
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: pay
  namespace: elevatedpos
spec:
  selector:
    app: pay
  ports:
    # Match the Helm-managed live resource so kubectl apply doesn't try to
    # strategic-merge in an extra unnamed port (which fails validation with
    # "spec.ports[*].name: Required value"). Named for defensive reasons.
    - name: http
      port: 3005
      targetPort: 3005
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pay
  namespace: elevatedpos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pay
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
