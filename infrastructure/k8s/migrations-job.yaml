# Run once before a new deployment to apply pending Drizzle migrations.
# Usage: kubectl apply -f infrastructure/k8s/migrations-job.yaml
# The job creates one Pod per service that runs `node dist/db/migrate.js`.
# Each service must expose a compiled migrate entry-point at dist/db/migrate.js
# (or use drizzle-kit directly via npx in the pod command).
#
# Trigger with:
#   kubectl create job --from=cronjob/elevatedpos-migrations elevatedpos-migrations-$(date +%s) -n elevatedpos
# or apply this manifest directly before each deploy.

apiVersion: batch/v1
kind: Job
metadata:
  name: elevatedpos-migrations
  namespace: elevatedpos
  labels:
    app.kubernetes.io/part-of: elevatedpos
    app.kubernetes.io/component: migrations
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: elevatedpos-migrations
    spec:
      restartPolicy: OnFailure
      serviceAccountName: elevatedpos-service
      initContainers:
        # Run each service's migration sequentially to avoid lock contention
        - name: migrate-auth
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/auth:latest
          command: ["npx", "drizzle-kit", "migrate"]
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: seed-auth
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/auth:latest
          command: ["node", "dist/db/seed.js"]
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-catalog
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/catalog:latest
          command: ["npx", "drizzle-kit", "migrate"]
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-inventory
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/inventory:latest
          command: ["npx", "drizzle-kit", "migrate"]
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-orders
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/orders:latest
          command: ["npx", "drizzle-kit", "migrate"]
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-payments
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/payments:latest
          command: ["npx", "drizzle-kit", "migrate"]
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-customers
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/customers:latest
          command: ["npx", "drizzle-kit", "migrate"]
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-loyalty
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/loyalty:latest
          command: ["npx", "drizzle-kit", "migrate"]
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-campaigns
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/campaigns:latest
          command: ["node", "-e", "const {Pool}=require('pg');const {drizzle}=require('drizzle-orm/node-postgres');const {migrate}=require('drizzle-orm/node-postgres/migrator');const p=new Pool({connectionString:process.env.DATABASE_URL});const d=drizzle(p);migrate(d,{migrationsFolder:'src/db/migrations',migrationsTable:'__drizzle_migrations'}).then(()=>{console.log('Migrations applied');p.end();process.exit(0);}).catch(e=>{console.error(e);p.end();process.exit(1);});"]
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-notifications
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/notifications:latest
          command: ["node", "-e", "const {Pool}=require('pg');const {drizzle}=require('drizzle-orm/node-postgres');const {migrate}=require('drizzle-orm/node-postgres/migrator');const p=new Pool({connectionString:process.env.DATABASE_URL});const d=drizzle(p);migrate(d,{migrationsFolder:'src/db/migrations',migrationsTable:'__drizzle_migrations'}).then(()=>{console.log('Migrations applied');p.end();process.exit(0);}).catch(e=>{console.error(e);p.end();process.exit(1);});"]
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-integrations
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/integrations:latest
          command: ["npx", "drizzle-kit", "migrate"]
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-automations
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/automations:latest
          command: ["node", "-e", "const {Pool}=require('pg');const {drizzle}=require('drizzle-orm/node-postgres');const {migrate}=require('drizzle-orm/node-postgres/migrator');const p=new Pool({connectionString:process.env.DATABASE_URL});const d=drizzle(p);migrate(d,{migrationsFolder:'src/db/migrations',migrationsTable:'__drizzle_migrations'}).then(()=>{console.log('Migrations applied');p.end();process.exit(0);}).catch(e=>{console.error(e);p.end();process.exit(1);});"]
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-franchise
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/franchise:latest
          command: ["npx", "drizzle-kit", "migrate"]
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-webhooks
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/webhooks:latest
          command: ["node", "-e", "const {Pool}=require('pg');const {drizzle}=require('drizzle-orm/node-postgres');const {migrate}=require('drizzle-orm/node-postgres/migrator');const p=new Pool({connectionString:process.env.DATABASE_URL});const d=drizzle(p);migrate(d,{migrationsFolder:'src/db/migrations',migrationsTable:'__drizzle_migrations'}).then(()=>{console.log('Migrations applied');p.end();process.exit(0);}).catch(e=>{console.error(e);p.end();process.exit(1);});"]
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
      containers:
        - name: done
          image: busybox:1.36
          command: ["sh", "-c", "echo 'All migrations complete'"]
