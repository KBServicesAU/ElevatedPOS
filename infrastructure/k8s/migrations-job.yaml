              const d=drizzle(p);
              migrate(d,{migrationsFolder:'src/db/migrations',migrationsTable:'__drizzle_migrations'})
                .then(()=>{console.log('orders: migrations applied');p.end();process.exit(0);})
                .catch(e=>{console.error('orders migration error:',e.message);p.end();process.exit(1);});
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config

