# Run once before a new deployment to apply pending Drizzle migrations.
# Usage: kubectl apply -f infrastructure/k8s/migrations-job.yaml
# The job creates one Pod per service that runs `node dist/db/migrate.js`.
# Each service must expose a compiled migrate entry-point at dist/db/migrate.js
# (or use drizzle-kit directly via npx in the pod command).
#
# Trigger with:
#   kubectl create job --from=cronjob/elevatedpos-migrations elevatedpos-migrations-$(date +%s) -n elevatedpos
# or apply this manifest directly before each deploy.

apiVersion: batch/v1
kind: Job
metadata:
  name: elevatedpos-migrations
  namespace: elevatedpos
  labels:
    app.kubernetes.io/part-of: elevatedpos
    app.kubernetes.io/component: migrations
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: elevatedpos-migrations
    spec:
      restartPolicy: OnFailure
      serviceAccountName: elevatedpos-service
      initContainers:
        # Run each service's migration sequentially to avoid lock contention
        - name: migrate-auth
          image: 643603453013.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/auth:v1.0.5
          command: ["npx", "drizzle-kit", "migrate"]
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-catalog
          image: 643603453013.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/catalog:v1.0.5
          command: ["npx", "drizzle-kit", "migrate"]
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-inventory
          image: 643603453013.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/inventory:v1.0.5
          command: ["npx", "drizzle-kit", "migrate"]
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-orders
          image: 643603453013.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/orders:v1.0.5
          command: ["npx", "drizzle-kit", "migrate"]
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-payments
          image: 643603453013.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/payments:v1.0.5
          command: ["npx", "drizzle-kit", "migrate"]
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-customers
          image: 643603453013.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/customers:v1.0.5
          command: ["npx", "drizzle-kit", "migrate"]
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-loyalty
          image: 643603453013.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/loyalty:v1.0.5
          command: ["npx", "drizzle-kit", "migrate"]
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-campaigns
          image: 643603453013.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/campaigns:v1.0.5
          command: ["npx", "drizzle-kit", "migrate"]
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-notifications
          image: 643603453013.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/notifications:v1.0.5
          command: ["npx", "drizzle-kit", "migrate"]
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-integrations
          image: 643603453013.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/integrations:v1.0.5
          command: ["npx", "drizzle-kit", "migrate"]
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-automations
          image: 643603453013.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/automations:v1.0.5
          command: ["npx", "drizzle-kit", "migrate"]
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-franchise
          image: 643603453013.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/franchise:v1.0.5
          command: ["npx", "drizzle-kit", "migrate"]
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
        - name: migrate-webhooks
          image: 643603453013.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/webhooks:v1.0.5
          command: ["npx", "drizzle-kit", "migrate"]
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
      containers:
        - name: done
          image: busybox:1.36
          command: ["sh", "-c", "echo 'All migrations complete'"]
