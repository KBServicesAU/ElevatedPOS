apiVersion: batch/v1
kind: Job
metadata:
  name: elevatedpos-migrations
  namespace: elevatedpos
  labels:
    app.kubernetes.io/part-of: elevatedpos
    app.kubernetes.io/component: migrations
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: elevatedpos-migrations
    spec:
      restartPolicy: OnFailure
      serviceAccountName: elevatedpos-service
      initContainers:

        - name: migrate-auth
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/auth:latest
          command:
            - node
            - -e
            - |
              const {Pool}=require('pg');
              const {drizzle}=require('drizzle-orm/node-postgres');
              const {migrate}=require('drizzle-orm/node-postgres/migrator');
              const p=new Pool({connectionString:process.env.DATABASE_URL,ssl:{rejectUnauthorized:false}});
              const d=drizzle(p);
              migrate(d,{migrationsFolder:'src/db/migrations',migrationsTable:'__drizzle_migrations'})
                .then(()=>{console.log('auth: migrations applied');p.end();process.exit(0);})
                .catch(e=>{console.error('auth migration error:',e.message);p.end();process.exit(1);});
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config

        - name: seed-auth
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/elevatedpos/auth:latest
          command: ["node", "dist/db/seed.js"]
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
