# ─── auth ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: nexus
  labels:
    app: auth
    app.kubernetes.io/name: nexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: nexus-auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: nexus-config
                  key: NODE_ENV
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: JWT_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: nexus
spec:
  type: ClusterIP
  selector:
    app: auth
  ports:
    - port: 4001
      targetPort: 4001
---
