          image: nexus-reporting:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4014
          env:
            - name: PORT
              value: "4014"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: nexus-config
                  key: NODE_ENV
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: JWT_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 4014
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 4014
            initialDelaySeconds: 5
            periodSeconds: 10
