# ─────────────────────────────────────────────────────────────────────────────
# External Secrets Operator — ExternalSecret for elevatedpos-secrets (v2.7.62)
# ─────────────────────────────────────────────────────────────────────────────
#
# DO NOT APPLY until:
#   1. ESO is installed (CRDs exist).
#   2. The five `elevatedpos/${env}/*` secrets in AWS Secrets Manager have
#      been populated with real prod values.
#   3. You're ready for the cutover described in runbook 02.
#
# This manifest creates a Kubernetes Secret named `elevatedpos-secrets`
# in the `elevatedpos` namespace by merging values from five Secrets
# Manager entries. The Secret name + namespace match what every
# deployment.yaml's secretRef already references — so once this is
# applied and the manual `elevatedpos-secrets` is deleted, ESO becomes
# the source of truth and pods pick up the values without redeploying.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: elevatedpos-secrets
  namespace: elevatedpos
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: elevatedpos-secrets
    creationPolicy: Owner   # ESO owns the resulting Secret. Delete the
                            # manual one BEFORE applying this file or ESO
                            # refuses to take over (creationPolicy=Owner
                            # won't claim an existing object).
  dataFrom:
    # ── auth secrets ────────────────────────────────────────────────────────
    # JWT_SECRET, INTERNAL_SECRET, NEXTAUTH_SECRET, WEBHOOK_SIGNING_SECRET,
    # ENCRYPTION_KEY
    - extract:
        key: elevatedpos/prod/auth

    # ── datastores ──────────────────────────────────────────────────────────
    # DATABASE_URL (RDS), REDIS_URL (ElastiCache, rediss://)
    - extract:
        key: elevatedpos/prod/datastore

    # ── stripe ──────────────────────────────────────────────────────────────
    # STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_CONNECT_CLIENT_ID
    - extract:
        key: elevatedpos/prod/stripe

    # ── email ───────────────────────────────────────────────────────────────
    # RESEND_API_KEY
    - extract:
        key: elevatedpos/prod/email

    # ── integrations ────────────────────────────────────────────────────────
    # ANZ_INTEGRATOR_ID, ANTHROPIC_API_KEY, TYPESENSE_API_KEY, TYRO_API_KEY
    - extract:
        key: elevatedpos/prod/integrations
