{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $name }}
    app.kubernetes.io/name: elevatedpos
    app.kubernetes.io/component: {{ $name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
        app.kubernetes.io/name: elevatedpos
        app.kubernetes.io/component: {{ $name }}
    spec:
      serviceAccountName: elevatedpos-app
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.global.imageRegistry }}/elevatedpos/{{ $name }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          envFrom:
            - secretRef:
                name: elevatedpos-secrets
            - configMapRef:
                name: elevatedpos-config
          env:
            - name: PORT
              value: {{ $svc.port | quote }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ default "/health" $svc.healthPath }}
              port: {{ $svc.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ default "/health" $svc.healthPath }}
              port: {{ $svc.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
{{- end }}
{{- end }}
