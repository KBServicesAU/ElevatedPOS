apiVersion: v1
kind: ConfigMap
metadata:
  name: elevatedpos-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: elevatedpos
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  TYPESENSE_HOST: {{ .Values.typesense.host | quote }}
  TYPESENSE_PORT: {{ .Values.typesense.port | quote }}
  POSTGRES_HOST: {{ .Values.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.postgres.port | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  KAFKA_BROKERS: {{ .Values.kafka.brokers | quote }}
  CLICKHOUSE_HOST: {{ .Values.clickhouse.host | quote }}
  CLICKHOUSE_PORT: {{ .Values.clickhouse.port | quote }}
  {{- range $name, $svc := .Values.services }}
  {{- if $svc.enabled }}
  {{ $name | upper | replace "-" "_" }}_SERVICE_URL: {{ printf "http://%s:%d" $name (int $svc.port) | quote }}
  {{- end }}
  {{- end }}
