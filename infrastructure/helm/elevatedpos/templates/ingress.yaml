{{- /* ─── Single-host portal ingress helper template ─── */}}
{{- define "elevatedpos.portalIngress" -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elevatedpos-{{ .name }}-ingress
  namespace: {{ .namespace }}
  labels:
    app.kubernetes.io/name: elevatedpos
    app.kubernetes.io/managed-by: Helm
  annotations:
    kubernetes.io/ingress.class: {{ .className | quote }}
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: {{ .className }}
  tls:
    - hosts:
        - {{ .host }}
      secretName: {{ .tlsSecretName }}
  rules:
    - host: {{ .host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .service }}
                port:
                  number: {{ .port }}
{{- end }}

{{- if .Values.ingress.enabled }}

{{- /* ─── Main API ingress: services with keepPathPrefix=true (path is forwarded as-is, no rewrite) ─── */}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elevatedpos-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: elevatedpos
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          {{- range $name, $svc := .Values.services }}
          {{- if and $svc.enabled $svc.keepPathPrefix (not $svc.isWebApp) }}
          - path: /api/v1/{{ $name }}
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $svc.port }}
          {{- end }}
          {{- end }}

{{- /* ─── Per-service ingresses: services where the URL prefix must be stripped ─── */}}
{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled (not $svc.keepPathPrefix) (not $svc.isWebApp) }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elevatedpos-ingress-{{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: elevatedpos
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
  annotations:
    kubernetes.io/ingress.class: {{ $.Values.ingress.className | quote }}
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /api/v1/$2
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  tls:
    - hosts:
        - {{ $.Values.ingress.host }}
      secretName: {{ $.Values.ingress.tlsSecretName }}
  rules:
    - host: {{ $.Values.ingress.host }}
      http:
        paths:
          - path: /api/v1/{{ $name }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $svc.port }}
{{- end }}
{{- end }}

{{- /* ─── Web app ingress (separate host, no path rewrite needed) ─── */}}
{{- if .Values.webApp.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elevatedpos-web-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: elevatedpos
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.webApp.host }}
      secretName: {{ .Values.webApp.tlsSecretName }}
  rules:
    - host: {{ .Values.webApp.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.webApp.service }}
                port:
                  number: {{ (index .Values.services .Values.webApp.service).port }}
{{- end }}

{{- /* ─── Marketing site ingress (elevatedpos.com.au + www) ─── */}}
{{- if .Values.marketingSite.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elevatedpos-marketing-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: elevatedpos
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        {{- range .Values.marketingSite.hosts }}
        - {{ . }}
        {{- end }}
      secretName: {{ .Values.marketingSite.tlsSecretName }}
  rules:
    {{- range .Values.marketingSite.hosts }}
    - host: {{ . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.marketingSite.service }}
                port:
                  number: {{ $.Values.marketingSite.port }}
    {{- end }}
{{- end }}

{{- if .Values.godmodePortal.enabled }}
{{ include "elevatedpos.portalIngress" (dict "name" "godmode" "namespace" .Values.global.namespace "className" .Values.ingress.className "host" .Values.godmodePortal.host "tlsSecretName" .Values.godmodePortal.tlsSecretName "service" .Values.godmodePortal.service "port" .Values.godmodePortal.port) }}
{{- end }}

{{- if .Values.orgPortal.enabled }}
{{ include "elevatedpos.portalIngress" (dict "name" "org-portal" "namespace" .Values.global.namespace "className" .Values.ingress.className "host" .Values.orgPortal.host "tlsSecretName" .Values.orgPortal.tlsSecretName "service" .Values.orgPortal.service "port" .Values.orgPortal.port) }}
{{- end }}

{{- if .Values.resellerPortal.enabled }}
{{ include "elevatedpos.portalIngress" (dict "name" "reseller-portal" "namespace" .Values.global.namespace "className" .Values.ingress.className "host" .Values.resellerPortal.host "tlsSecretName" .Values.resellerPortal.tlsSecretName "service" .Values.resellerPortal.service "port" .Values.resellerPortal.port) }}
{{- end }}

{{- if .Values.payPortal.enabled }}
{{ include "elevatedpos.portalIngress" (dict "name" "pay" "namespace" .Values.global.namespace "className" .Values.ingress.className "host" .Values.payPortal.host "tlsSecretName" .Values.payPortal.tlsSecretName "service" .Values.payPortal.service "port" .Values.payPortal.port) }}
{{- end }}

{{- end }}
