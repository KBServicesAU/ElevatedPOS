ingress:
  enabled: true
  className: nginx
  host: api.elevatedpos.com.au
  tlsSecretName: elevatedpos-tls
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod

webApp:
  enabled: true
  host: app.elevatedpos.com.au
  service: web-backoffice
  tlsSecretName: elevatedpos-app-tls

marketingSite:
  enabled: true
  hosts:
    - elevatedpos.com.au
    - www.elevatedpos.com.au
  service: storefront
  port: 3002
  tlsSecretName: elevatedpos-marketing-tls

# v2.7.85 — public merchant storefronts at `site.elevatedpos.com.au/<slug>`.
# The `[slug]` route is already implemented in
# apps/storefront/app/[slug]/page.tsx; this block wires the host through
# nginx-ingress + cert-manager.
#
# IMPORTANT: the DNS A/CNAME for `site.elevatedpos.com.au` must resolve
# to the cluster's nginx-ingress load balancer for cert-manager's HTTP-01
# challenge to succeed. The host has its OWN TLS secret so a DNS lag
# can't take down the marketing-site cert.
#
# v2.7.86 — flipped enabled to true alongside the Shopify-lite extensions.
storesPortal:
  enabled: true
  host: site.elevatedpos.com.au
  service: storefront
  port: 3002
  tlsSecretName: elevatedpos-stores-tls

godmodePortal:
  enabled: true
  host: godmode.elevatedpos.com.au
  service: godmode
  port: 3010
  tlsSecretName: elevatedpos-godmode-tls

orgPortal:
  enabled: true
  host: organisation.elevatedpos.com.au
  service: org-portal
  port: 3011
  tlsSecretName: elevatedpos-org-tls

resellerPortal:
  enabled: true
  host: reseller.elevatedpos.com.au
  service: reseller-portal
  port: 3012
  tlsSecretName: elevatedpos-reseller-tls

payPortal:
  enabled: true
  host: pay.elevatedpos.com.au
  service: pay
  port: 80
  tlsSecretName: elevatedpos-pay-tls

postgres:
  host: elevatedpos-prod.c1ga8c4uww8a.ap-southeast-2.rds.amazonaws.com
  port: 5432
  database: elevatedpos

redis:
  url: rediss://master.elevatedpos-prod.ug1fbe.apse2.cache.amazonaws.com:6379

kafka:
  brokers: b-1.elevatedposprod.ulrbw6.c3.kafka.ap-southeast-2.amazonaws.com:9094,b-2.elevatedposprod.ulrbw6.c3.kafka.ap-southeast-2.amazonaws.com:9094,b-3.elevatedposprod.ulrbw6.c3.kafka.ap-southeast-2.amazonaws.com:9094

