        memory: "512Mi"
  hardware-bridge:
    enabled: true
    replicas: 1
    port: 9999
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

ingress:
  enabled: true
  className: nginx
  host: api.elevatedpos.com.au
  tlsSecretName: elevatedpos-tls

postgres:
  host: postgres
  port: 5432
  database: elevatedpos

redis:
  url: redis://redis:6379

kafka:
  brokers: kafka:9092

typesense:
  host: typesense
  port: 8108

clickhouse:
  host: clickhouse
  port: 8123
