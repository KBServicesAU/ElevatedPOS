global:
  imageRegistry: ""
  imagePullPolicy: Always
  namespace: elevatedpos

image:
  tag: latest

services:
  auth:
    enabled: true
    replicas: 2
    port: 4001
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  catalog:
    enabled: true
    replicas: 2
    port: 4002
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
