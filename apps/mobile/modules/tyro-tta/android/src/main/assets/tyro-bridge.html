<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tyro Bridge</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      /* Transparent — Tyro IClientWithUI renders its own iframe UI inside
         this WebView. The POS app never needs to supply transaction UI. */
      background: transparent;
    }
  </style>
</head>
<body>

  <!--
    Tyro iClient JavaScript SDK (headful / IClientWithUI mode).
    The correct URL is swapped in at runtime by injected JS before
    calling tyroBridge.init(), so we can switch between:
      - https://iclient.tyro.com          (production)
      - https://iclient.test.tyro.com     (pre-prod, physical terminal)
      - https://iclientsimulator.test.tyro.com (simulator, no terminal)

    Headful mode: TYRO.IClientWithUI renders its own modal iframe inside
    this WebView. The POS side only receives receiptCallback and
    transactionCompleteCallback — all status messages, questions, and
    cancel/confirm prompts are handled by Tyro's built-in UI.

    Pairing still uses the headless pairTerminal() method (mandatory for
    Android 12+ where third-party cookies are blocked for headless flows).
  -->
  <script>
    // ================================================================
    // TYRO HEADFUL BRIDGE (IClientWithUI)
    // ================================================================
    //
    // Native -> JS: evaluateJavascript("tyroBridge.xxx(...)")
    // JS -> Native: window.Android.xxx(jsonString)
    //
    // Callbacks forwarded to native:
    //   onReady              — IClientWithUI instantiated
    //   onInitError          — script load or constructor failure
    //   onReceipt            — merchant receipt text (when integratedReceipt=true)
    //   onTransactionComplete — final result (APPROVED / DECLINED / etc.)
    //   onResponse           — settlement / report / tip / closeTab / etc.
    //   onPairingStatus      — pairing success / failure / inProgress
    //   onScriptLoaded       — DOM ready, awaiting tyroBridge.init()
    //   log                  — diagnostic strings
    //
    // NOTE: statusMessageCallback and questionCallback are handled by
    // Tyro's own iframe UI — we do NOT forward them to native.
    // ================================================================

    (function () {
      var state = {
        client: null,
        apiKey: null,
        posProduct: null,
        scriptLoaded: false,
        scriptUrl: null,
      };

      // --------------------------------------------------------------
      // Native bridge (safe wrappers)
      // --------------------------------------------------------------

      function native() {
        return (typeof window.Android !== 'undefined') ? window.Android : null;
      }

      function send(method, payload) {
        try {
          var n = native();
          if (!n || typeof n[method] !== 'function') return;
          var json = (typeof payload === 'string') ? payload : JSON.stringify(payload || {});
          n[method](json);
        } catch (e) {
          try { var n2 = native(); if (n2 && n2.log) n2.log('bridge send failed: ' + (e && e.message)); } catch (e2) {}
        }
      }

      function log(msg) {
        try { send('log', String(msg)); } catch (e) {}
      }

      // --------------------------------------------------------------
      // Script loader
      // --------------------------------------------------------------

      function loadTyroScript(scriptUrl, done) {
        // Accept either IClientWithUI (headful/production) or IClient (headless/test)
        if (state.scriptLoaded && window.TYRO && (window.TYRO.IClientWithUI || window.TYRO.IClient)) {
          done(null);
          return;
        }
        var s = document.createElement('script');
        s.type = 'text/javascript';
        s.async = true;
        s.src = scriptUrl;
        s.onload = function () {
          state.scriptLoaded = true;
          if (window.TYRO && (window.TYRO.IClientWithUI || window.TYRO.IClient)) done(null);
          else done(new Error('TYRO.IClientWithUI and TYRO.IClient both undefined after script load'));
        };
        s.onerror = function () {
          done(new Error('Failed to load ' + scriptUrl));
        };
        document.head.appendChild(s);
      }

      // --------------------------------------------------------------
      // Callback factory.
      // IClientWithUI (headful): Tyro's iframe handles status/questions/cancel;
      //   only receiptCallback + transactionCompleteCallback needed.
      // IClient (headless fallback): questionCallback is REQUIRED or Tyro
      //   throws "questionCallback must be a function". We auto-answer YES.
      // receiptCallback handles both IClientWithUI (single object arg) and
      //   IClient (positional: tag, signatureRequired, merchantReceipt).
      // --------------------------------------------------------------

      function buildCallbacks(tag) {
        return {
          // IClient (headless fallback) requires statusMessageCallback or throws.
          // IClientWithUI (headful) ignores it.
          statusMessageCallback: function (msg) {
            log('status: ' + String(msg));
          },
          // IClient requires questionCallback; question is { text, options, isError }.
          // Answer with options[0] — covers "OK" error dialogs and "YES/NO" prompts.
          // IClientWithUI ignores this — its modal handles questions natively.
          questionCallback: function (question, answer) {
            var opts = (question && typeof question === 'object' && question.options) ? question.options : [];
            var response = (opts.length > 0) ? opts[0] : 'YES';
            log('questionCallback: ' + (question && question.text || String(question)) + ' → ' + response);
            if (typeof answer === 'function') answer(response);
          },
          // Handle both IClientWithUI (single receipt object) and
          // IClient (positional args: tag, signatureRequired, merchantReceipt).
          receiptCallback: function (tagOrReceipt, signatureRequired, merchantReceipt) {
            var sigReq, rcpt;
            if (tagOrReceipt && typeof tagOrReceipt === 'object') {
              sigReq = !!(tagOrReceipt.signatureRequired);
              rcpt = tagOrReceipt.merchantReceipt || '';
            } else {
              sigReq = !!signatureRequired;
              rcpt = merchantReceipt || '';
            }
            send('onReceipt', { tag: tag, signatureRequired: sigReq, merchantReceipt: rcpt });
          },
          transactionCompleteCallback: function (response) {
            send('onTransactionComplete', { tag: tag, response: response || {} });
          },
        };
      }

      // --------------------------------------------------------------
      // Public API — called by native via evaluateJavascript
      // --------------------------------------------------------------

      var api = {
        /**
         * Load the Tyro iClient script and create an IClientWithUI instance.
         * @param apiKey         String - Tyro-provided API key
         * @param posVendor      String - e.g. "ElevatedPOS"
         * @param posName        String - e.g. "ElevatedPOS Mobile POS"
         * @param posVersion     String - e.g. "1.9.1"
         * @param siteReference  String - site reference from Tyro portal (may be empty)
         * @param scriptUrl      String - full URL to iclient-v1.js
         */
        init: function (apiKey, posVendor, posName, posVersion, siteReference, scriptUrl) {
          try {
            state.apiKey = apiKey;
            state.scriptUrl = scriptUrl;
            state.posProduct = {
              posProductVendor: posVendor || 'ElevatedPOS',
              posProductName: posName || 'ElevatedPOS Mobile POS',
              posProductVersion: posVersion || '1.0.0',
            };
            // siteReference is optional but included if provided
            if (siteReference) {
              state.posProduct.siteReference = siteReference;
            }
            loadTyroScript(scriptUrl, function (err) {
              if (err) {
                send('onInitError', { message: err.message || String(err) });
                return;
              }
              try {
                // Prefer IClientWithUI (headful — Tyro renders its own modal UI).
                // Fall back to IClient (headless) for the test environment SDK.
                var TyroConstructor = (window.TYRO && (window.TYRO.IClientWithUI || window.TYRO.IClient));
                if (!TyroConstructor) throw new Error('Tyro SDK: neither IClientWithUI nor IClient found');
                log('Using ' + (window.TYRO.IClientWithUI ? 'IClientWithUI' : 'IClient') + ' constructor');
                state.client = new TyroConstructor(apiKey, state.posProduct);
                send('onReady', { ok: true });
              } catch (e) {
                send('onInitError', { message: (e && e.message) || String(e) });
              }
            });
          } catch (e) {
            send('onInitError', { message: (e && e.message) || String(e) });
          }
        },

        /**
         * Headless pairing — mandatory on Android 12+ where third-party
         * cookies are unavailable for the headless transaction flow.
         * Result is streamed via onPairingStatus events.
         */
        pair: function (mid, tid) {
          try {
            if (!state.client) {
              send('onPairingStatus', { status: 'failure', message: 'Tyro not initialized' });
              return;
            }
            state.client.pairTerminal(String(mid), String(tid), function (response) {
              send('onPairingStatus', response || { status: 'failure', message: 'empty response' });
            });
          } catch (e) {
            send('onPairingStatus', { status: 'failure', message: (e && e.message) || String(e) });
          }
        },

        /**
         * Initiate a purchase.
         * Tyro's iframe UI will appear inside this WebView automatically.
         */
        purchase: function (amountCents, cashoutCents, integratedReceipt, enableSurcharge, transactionId) {
          try {
            if (!state.client) {
              send('onTransactionComplete', { tag: 'purchase', response: { result: 'SYSTEM ERROR', errorMessage: 'Tyro not initialized' } });
              return;
            }
            var req = {
              amount: String(amountCents || '0'),
              integratedReceipt: !!integratedReceipt,
            };
            if (cashoutCents && String(cashoutCents) !== '0') req.cashout = String(cashoutCents);
            if (enableSurcharge) req.enableSurcharge = true;
            if (transactionId) req.transactionId = String(transactionId);
            state.client.initiatePurchase(req, buildCallbacks('purchase'));
          } catch (e) {
            send('onTransactionComplete', { tag: 'purchase', response: { result: 'SYSTEM ERROR', errorMessage: (e && e.message) || String(e) } });
          }
        },

        /**
         * Initiate a refund.
         * Tyro's iframe UI will appear inside this WebView automatically.
         */
        refund: function (amountCents, integratedReceipt, transactionId) {
          try {
            if (!state.client) {
              send('onTransactionComplete', { tag: 'refund', response: { result: 'SYSTEM ERROR', errorMessage: 'Tyro not initialized' } });
              return;
            }
            var req = {
              amount: String(amountCents || '0'),
              integratedReceipt: !!integratedReceipt,
            };
            if (transactionId) req.transactionId = String(transactionId);
            state.client.initiateRefund(req, buildCallbacks('refund'));
          } catch (e) {
            send('onTransactionComplete', { tag: 'refund', response: { result: 'SYSTEM ERROR', errorMessage: (e && e.message) || String(e) } });
          }
        },

        /**
         * Cancel the currently running transaction.
         * In headful mode this is a safety-valve — Tyro's UI provides
         * its own cancel button. Only call this if the WebView is stuck.
         */
        cancel: function () {
          try {
            if (state.client && typeof state.client.cancelCurrentTransaction === 'function') {
              state.client.cancelCurrentTransaction();
            }
          } catch (e) {
            log('cancel error: ' + ((e && e.message) || String(e)));
          }
        },

        /** Open a bar tab (pre-auth style). */
        openTab: function (amountCents, integratedReceipt) {
          try {
            if (!state.client) { send('onTransactionComplete', { tag: 'openTab', response: { result: 'SYSTEM ERROR', errorMessage: 'Tyro not initialized' } }); return; }
            state.client.initiateOpenTab(
              { amount: String(amountCents || '0'), integratedReceipt: !!integratedReceipt },
              buildCallbacks('openTab')
            );
          } catch (e) {
            send('onTransactionComplete', { tag: 'openTab', response: { result: 'SYSTEM ERROR', errorMessage: (e && e.message) || String(e) } });
          }
        },

        /** Close a bar tab. completionReference is returned by openTab. */
        closeTab: function (completionReference, amountCents) {
          try {
            if (!state.client) { send('onResponse', { tag: 'closeTab', response: { result: 'failure', message: 'Tyro not initialized' } }); return; }
            state.client.closeTab(String(completionReference), String(amountCents || '0'), function (r) {
              send('onResponse', { tag: 'closeTab', response: r || {} });
            });
          } catch (e) {
            send('onResponse', { tag: 'closeTab', response: { result: 'failure', message: (e && e.message) || String(e) } });
          }
        },

        /** Open pre-auth. */
        openPreAuth: function (amountCents, integratedReceipt) {
          try {
            if (!state.client) { send('onTransactionComplete', { tag: 'openPreAuth', response: { result: 'SYSTEM ERROR', errorMessage: 'Tyro not initialized' } }); return; }
            state.client.initiateOpenPreAuth(
              { amount: String(amountCents || '0'), integratedReceipt: !!integratedReceipt },
              buildCallbacks('openPreAuth')
            );
          } catch (e) {
            send('onTransactionComplete', { tag: 'openPreAuth', response: { result: 'SYSTEM ERROR', errorMessage: (e && e.message) || String(e) } });
          }
        },

        /** Increment pre-auth. */
        incrementPreAuth: function (completionReference, amountCents, integratedReceipt) {
          try {
            if (!state.client) { send('onTransactionComplete', { tag: 'incrementPreAuth', response: { result: 'SYSTEM ERROR', errorMessage: 'Tyro not initialized' } }); return; }
            state.client.initiateIncrementPreAuth(
              {
                preAuthCompletionReference: String(completionReference),
                amount: String(amountCents || '0'),
                integratedReceipt: !!integratedReceipt,
              },
              buildCallbacks('incrementPreAuth')
            );
          } catch (e) {
            send('onTransactionComplete', { tag: 'incrementPreAuth', response: { result: 'SYSTEM ERROR', errorMessage: (e && e.message) || String(e) } });
          }
        },

        /** Complete (close) pre-auth with a final amount. */
        completePreAuth: function (completionReference, amountCents, integratedReceipt) {
          try {
            if (!state.client) { send('onResponse', { tag: 'completePreAuth', response: { result: 'failure', message: 'Tyro not initialized' } }); return; }
            state.client.completePreAuth(
              String(completionReference),
              String(amountCents || '0'),
              !!integratedReceipt,
              function (r) { send('onResponse', { tag: 'completePreAuth', response: r || {} }); }
            );
          } catch (e) {
            send('onResponse', { tag: 'completePreAuth', response: { result: 'failure', message: (e && e.message) || String(e) } });
          }
        },

        /** Void a pre-auth. */
        voidPreAuth: function (completionReference, integratedReceipt) {
          try {
            if (!state.client) { send('onResponse', { tag: 'voidPreAuth', response: { result: 'failure', message: 'Tyro not initialized' } }); return; }
            state.client.voidPreAuth(
              String(completionReference),
              !!integratedReceipt,
              function (r) { send('onResponse', { tag: 'voidPreAuth', response: r || {} }); }
            );
          } catch (e) {
            send('onResponse', { tag: 'voidPreAuth', response: { result: 'failure', message: (e && e.message) || String(e) } });
          }
        },

        /** Add a tip to a completed purchase. */
        addTip: function (completionReference, tipCents) {
          try {
            if (!state.client) { send('onResponse', { tag: 'addTip', response: { result: 'failure', message: 'Tyro not initialized' } }); return; }
            state.client.addTip(
              String(completionReference),
              String(tipCents || '0'),
              function (r) { send('onResponse', { tag: 'addTip', response: r || {} }); }
            );
          } catch (e) {
            send('onResponse', { tag: 'addTip', response: { result: 'failure', message: (e && e.message) || String(e) } });
          }
        },

        /** Trigger manual settlement (end-of-day close). */
        manualSettlement: function () {
          try {
            if (!state.client) { send('onResponse', { tag: 'settlement', response: { result: 'failure', message: 'Tyro not initialized' } }); return; }
            state.client.manualSettlement(function (r) {
              send('onResponse', { tag: 'settlement', response: r || {} });
            });
          } catch (e) {
            send('onResponse', { tag: 'settlement', response: { result: 'failure', message: (e && e.message) || String(e) } });
          }
        },

        /** Integrated reconciliation report. reportType: 'txt' or 'xml' */
        reconciliationReport: function (reportType, date) {
          try {
            if (!state.client) { send('onResponse', { tag: 'report', response: { result: 'failure', message: 'Tyro not initialized' } }); return; }
            var req = {};
            if (reportType) req.reportType = String(reportType);
            if (date) req.date = String(date);
            state.client.reconciliationReport(req, function (r) {
              send('onResponse', { tag: 'report', response: r || {} });
            });
          } catch (e) {
            send('onResponse', { tag: 'report', response: { result: 'failure', message: (e && e.message) || String(e) } });
          }
        },

        /** Get current pairing configuration (MID / TID). */
        getConfiguration: function () {
          try {
            if (!state.client) { send('onResponse', { tag: 'config', response: { result: 'failure', message: 'Tyro not initialized' } }); return; }
            state.client.getConfiguration(function (r) {
              send('onResponse', { tag: 'config', response: r || {} });
            });
          } catch (e) {
            send('onResponse', { tag: 'config', response: { result: 'failure', message: (e && e.message) || String(e) } });
          }
        },
      };

      window.tyroBridge = api;

      try { send('onScriptLoaded', { ok: true }); } catch (e) {}
    })();
  </script>
</body>
</html>
