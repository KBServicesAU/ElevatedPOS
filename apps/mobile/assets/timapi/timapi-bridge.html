<!DOCTYPE html>
<!--
  ANZ Worldline TIM API – Android WebView Bridge
  ================================================
  This page runs inside a hidden WebView (AnzBridgeHost) for the life
  of the POS session. It loads timapi.js (co-located in this folder),
  connects to the EFTPOS terminal via WebSocket (SIXml), and reports
  results back to React Native via window.ReactNativeWebView.postMessage().

  Files required in apps/mobile/assets/timapi/:
    - timapi-bridge.html  (this file)
    - timapi.js           (obtain from ANZ Worldline portal)
    - timapi.wasm         (obtain from ANZ Worldline portal)

  Portal: https://start.portal.anzworldline-solutions.com.au/

  Supported commands from React Native:
    { type: 'open_till',   requestId, terminalIp, terminalPort, integratorId? }
    { type: 'transaction', requestId, amountCents, referenceId? }
    { type: 'close_till',  requestId }
    { type: 'cancel' }

  Responses carry the requestId back so the RN host can resolve the
  matching promise.
-->
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    // Notify React Native when the page is ready to receive commands
    window.onTimApiReady = function () {
      rn({ type: 'sdk_ready' });
    };

    // Helper — send JSON message to React Native
    function rn(obj) {
      try {
        window.ReactNativeWebView.postMessage(JSON.stringify(obj));
      } catch (e) {
        console.error('postMessage failed', e);
      }
    }

    // Shared state — persists across commands for the life of the page.
    var terminal = null;
    // The active lifecycle context (holds the per-step resolvers).
    var ctx = null;

    // ── Handle commands from React Native ──────────────────────────────────────
    function handleMessage(raw) {
      var msg;
      try { msg = JSON.parse(raw); } catch (_) { return; }

      if (msg.type === 'open_till') {
        openTill(msg);
      } else if (msg.type === 'transaction') {
        runTransaction(msg);
      } else if (msg.type === 'close_till') {
        closeTill(msg);
      } else if (msg.type === 'force_reset') {
        // Operator-triggered escape hatch when a lifecycle step hangs
        // (e.g. Activate stuck). Dispose any live terminal handle and
        // clear the shared ctx so the next open_till starts from a
        // clean slate. Unlike close_till this does NOT try to talk to
        // the terminal first — it's a local cleanup only.
        if (terminal) {
          try { if (typeof terminal.cancel === 'function') terminal.cancel(); } catch (_) { /* ignore */ }
          try { terminal.dispose(); } catch (_) { /* ignore */ }
        }
        terminal = null;
        ctx = null;
        rn({ type: 'status', message: 'Bridge reset' });
      } else if (msg.type === 'cancel') {
        // The TIM API SDK exposes `terminal.cancel()` (synchronous, no
        // Async suffix). Previous versions of this bridge called
        // `cancelAsync()` which doesn't exist on the Terminal prototype —
        // the undefined-is-not-a-function error was caught and silently
        // ignored, so the terminal kept showing the amount. Defensive:
        // try both names in case a future SDK build adds Async back.
        if (terminal) {
          var attempted = '';
          var names = ['cancel', 'cancelAsync', 'abort', 'abortAsync'];
          for (var i = 0; i < names.length; i++) {
            var fn = terminal[names[i]];
            if (typeof fn === 'function') {
              try { fn.call(terminal); attempted = names[i]; break; } catch (_) { /* try next */ }
            }
          }
          rn({ type: 'status', message: attempted ? ('Cancel sent (' + attempted + ')') : 'Cancel not supported by SDK' });
        } else {
          rn({ type: 'status', message: 'Cancel ignored — no active terminal' });
        }
      }
    }

    // React Native sends messages via injectedJavaScript — listen on document
    document.addEventListener('message', function (e) { handleMessage(e.data); });
    // Android fires on window
    window.addEventListener('message', function (e) { handleMessage(e.data); });

    // ── Helper: extract cardholder + merchant receipts from an SDK payload ──
    // The TIM API SDK delivers receipts as:
    //   data.receipts            → Receipt[]   (on commit / dcc results)
    //   data.printData.receipts  → Receipt[]   (on activate / transaction results)
    // Each Receipt = { recipient: 'cardholder' | 'merchant' | 'both', value: string }
    //
    // Earlier versions of this bridge looked for
    // `data.merchantReceiptText` / `data.customerReceiptText` which never
    // existed in the SDK — so merchant/customer receipts always came back
    // as null. This helper is the single source of truth.
    function extractReceipts(data) {
      var arr = null;
      if (data && Array.isArray(data.receipts)) arr = data.receipts;
      else if (data && data.printData && Array.isArray(data.printData.receipts)) arr = data.printData.receipts;
      if (!arr) return { merchant: null, customer: null };
      var merchant = null, customer = null;
      for (var i = 0; i < arr.length; i++) {
        var r = arr[i] || {};
        var recip = String(r.recipient || '').toLowerCase();
        var text  = typeof r.value === 'string' ? r.value : '';
        if (!text) continue;
        if (recip === 'merchant' || recip === 'both') {
          if (!merchant) merchant = text; else merchant += '\n' + text;
        }
        if (recip === 'cardholder' || recip === 'both') {
          if (!customer) customer = text; else customer += '\n' + text;
        }
      }
      return { merchant: merchant, customer: customer };
    }

    // Merge two {merchant, customer} pairs. Newline-joins when both sides
    // supplied a value so we don't drop receipt text that arrived via
    // receiptGenerated() and via transactionCompleted().
    function mergeReceipts(a, b) {
      function join(x, y) {
        if (!x) return y || null;
        if (!y) return x || null;
        if (x === y) return x;
        return x + '\n' + y;
      }
      return {
        merchant: join(a && a.merchant, b && b.merchant),
        customer: join(a && a.customer, b && b.customer),
      };
    }

    // ── Helper: build a listener object that resolves step-promises ─────────
    // NOTE: timapi.DefaultTerminalListener is an ES6 class in the SDK.
    // Trying to extend it via the ES5 prototype pattern
    // (`function Foo(){ Base.call(this); }`) throws
    // "Class constructors cannot be invoked with 'new'" on Hermes because
    // ES6 classes can't be invoked without `new`.
    //
    // terminal.addListener() accepts a plain object with method callbacks —
    // that's what the ANZ samples use and is the portable, version-safe way.
    function makeFlowListener(c) {
      return {
        connectCompleted: function (event) {
          var r = c.connectResolver; c.connectResolver = null;
          if (r) r(event);
        },
        loginCompleted: function (event) {
          var r = c.loginResolver; c.loginResolver = null;
          if (r) r(event);
        },
        activateCompleted: function (event, data) {
          var r = c.activateResolver; c.activateResolver = null;
          if (r) r({ event: event, data: data });
        },
        deactivateCompleted: function (event, data) {
          var r = c.deactivateResolver; c.deactivateResolver = null;
          if (r) r({ event: event, data: data });
        },
        logoutCompleted: function (event) {
          var r = c.logoutResolver; c.logoutResolver = null;
          if (r) r(event);
        },
        transactionCompleted: function (event, data) {
          var r = c.txResolver; c.txResolver = null;
          if (r) r({ event: event, data: data });
        },
        displayTextChanged: function (event, data) {
          var text = (data && data.text) ? String(data.text).trim() : '';
          if (text) rn({ type: 'status', message: text });
        },
        connectionStateChanged: function () {
          // No-op — we drive state via the per-step promises above.
        },
        receiptGenerated: function (_event, data) {
          // Some SDK builds deliver receipts via this callback in addition
          // to (or instead of) the transactionCompleted payload. Collect any
          // that arrive here so runTransaction can merge them before
          // resolving. The primary path is still data.receipts /
          // data.printData.receipts on transactionCompleted — this is
          // defensive only.
          try {
            var extracted = extractReceipts(data);
            if (extracted.merchant || extracted.customer) {
              if (!c.pendingReceipts) c.pendingReceipts = [];
              c.pendingReceipts.push(extracted);
            }
          } catch (_) { /* ignore */ }
        },
        disconnected: function (_t, exception) {
          var h = c.disconnectHandler; c.disconnectHandler = null;
          if (h) h(exception);
        }
      };
    }

    // ── Helper: run a single SDK step as a promise with per-step timeout ───
    function runStep(c, label, timeoutMs, setup) {
      return new Promise(function (resolve, reject) {
        var settled = false;
        var timer = setTimeout(function () {
          if (settled) return;
          settled = true;
          reject(new Error(label + ' timed out after ' + Math.round(timeoutMs / 1000) + 's'));
        }, timeoutMs);

        var done = function (eventOrWrapper) {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          var event = (eventOrWrapper && eventOrWrapper.event) ? eventOrWrapper.event : eventOrWrapper;
          if (event && event.exception !== undefined) {
            reject(new Error((event.exception && event.exception.message) || (label + ' failed')));
            return;
          }
          resolve(eventOrWrapper);
        };

        c.disconnectHandler = function (exception) {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          reject(new Error((exception && exception.message) || ('Terminal disconnected during ' + label)));
        };

        setup(done);
      });
    }

    function makeCtx() {
      return {
        connectResolver:    null,
        loginResolver:      null,
        activateResolver:   null,
        deactivateResolver: null,
        logoutResolver:     null,
        txResolver:         null,
        disconnectHandler:  null,
        // Receipts that arrive asynchronously via receiptGenerated during a
        // transaction — merged with the transactionCompleted payload before
        // we resolve the tx promise. Cleared at the start of each tx.
        pendingReceipts:    null,
      };
    }

    // ── Open Till: Connect → Login → Activate ──────────────────────────────
    function openTill(msg) {
      var reqId = msg.requestId;
      if (!window.timapi) {
        rn({ type: 'error', requestId: reqId, message: 'TIM API SDK not loaded. Place timapi.js in assets/timapi/.' });
        return;
      }
      // Idempotent — if a terminal is already alive (e.g. the RN host
      // called open_till as a self-heal after a remount but the previous
      // WebView still had a live handle in scope), dispose it and start
      // fresh so we always end in a known-good activated state.
      if (terminal) {
        try { terminal.dispose(); } catch (_) { /* ignore */ }
        terminal = null;
        ctx = null;
      }

      try {
        var settings = new timapi.TerminalSettings();
        settings.connectionIPString = msg.terminalIp;
        settings.connectionIPPort   = msg.terminalPort || 7784;
        settings.fetchBrands        = false;
        settings.autoCommit         = false;
        if (msg.integratorId && typeof msg.integratorId === 'string' && msg.integratorId.length > 0) {
          settings.integratorId = msg.integratorId;
        }

        terminal = new timapi.Terminal(settings);
        terminal.setPosId('12');
        terminal.setUserId(1);

        ctx = makeCtx();
        terminal.addListener(makeFlowListener(ctx));

        rn({ type: 'status', message: 'Connecting\u2026' });
        runStep(ctx, 'Connect', 15000, function (done) {
          ctx.connectResolver = done;
          terminal.connectAsync();
        }).then(function () {
          rn({ type: 'status', message: 'Logging in\u2026' });
          return runStep(ctx, 'Login', 60000, function (done) {
            ctx.loginResolver = done;
            terminal.loginAsync();
          });
        }).then(function () {
          rn({ type: 'status', message: 'Activating\u2026' });
          return runStep(ctx, 'Activate', 30000, function (done) {
            ctx.activateResolver = done;
            terminal.activateAsync();
          });
        }).then(function () {
          rn({ type: 'till_opened', requestId: reqId });
          // Keep the terminal alive for subsequent transactions.
        }).catch(function (err) {
          var errMsg = (err && err.message) || String(err);
          rn({ type: 'error', requestId: reqId, message: errMsg });
          try { if (terminal && terminal.dispose) terminal.dispose(); } catch (_) { /* ignore */ }
          terminal = null;
          ctx = null;
        });
      } catch (e) {
        rn({ type: 'error', requestId: reqId, message: (e && e.message) || String(e) });
        try { if (terminal && terminal.dispose) terminal.dispose(); } catch (_) { /* ignore */ }
        terminal = null;
        ctx = null;
      }
    }

    // ── Transaction (requires open till): transactionAsync → commitAsync ───
    function runTransaction(msg) {
      var reqId = msg.requestId;
      if (!terminal || !ctx) {
        rn({ type: 'error', requestId: reqId, message: 'Till is not open' });
        return;
      }

      // Reset receipt buffer for this transaction so receiptGenerated events
      // from a previous tx don't bleed in.
      ctx.pendingReceipts = [];

      try {
        rn({ type: 'status', message: 'Present card\u2026' });
        runStep(ctx, 'Transaction', 180000, function (done) {
          ctx.txResolver = done;
          terminal.transactionAsync(
            timapi.constants.TransactionType.purchase,
            new timapi.Amount(msg.amountCents, timapi.constants.Currency.AUD),
            (msg.referenceId && typeof msg.referenceId === 'string') ? msg.referenceId : undefined
          );
        }).then(function (wrapper) {
          var data = wrapper && wrapper.data;
          try { terminal.commitAsync(); } catch (_) { /* non-fatal */ }

          // Primary extraction from transactionCompleted payload.
          var receipts = extractReceipts(data);
          // Fold in anything collected via receiptGenerated callbacks.
          var pending = ctx.pendingReceipts || [];
          for (var i = 0; i < pending.length; i++) {
            receipts = mergeReceipts(receipts, pending[i]);
          }
          ctx.pendingReceipts = null;

          rn({
            type:            'approved',
            requestId:       reqId,
            transactionRef:  (data && data.transactionReference) || null,
            authCode:        (data && data.authorisationCode)    || null,
            maskedPan:       (data && data.maskedPan)            || null,
            cardType:        (data && data.cardType)             || null,
            rrn:             (data && data.rrn)                  || null,
            merchantReceipt: receipts.merchant,
            customerReceipt: receipts.customer,
          });
          // Leave terminal alive for subsequent transactions.
        }).catch(function (err) {
          if (ctx) ctx.pendingReceipts = null;
          // Transaction failures are NOT fatal to the till session — the
          // terminal stays alive so the operator can retry.
          var errMsg = (err && err.message) || String(err);
          rn({ type: 'error', requestId: reqId, message: errMsg });
        });
      } catch (e) {
        rn({ type: 'error', requestId: reqId, message: (e && e.message) || String(e) });
      }
    }

    // ── Close Till: Deactivate → Logout → Dispose ──────────────────────────
    function closeTill(msg) {
      var reqId = msg.requestId;
      if (!terminal || !ctx) {
        rn({ type: 'error', requestId: reqId, message: 'Till is not open' });
        return;
      }

      rn({ type: 'status', message: 'Deactivating\u2026' });
      runStep(ctx, 'Deactivate', 30000, function (done) {
        ctx.deactivateResolver = done;
        try { terminal.deactivateAsync(); } catch (err) { done({ exception: err }); }
      }).then(function () {
        rn({ type: 'status', message: 'Logging out\u2026' });
        return runStep(ctx, 'Logout', 30000, function (done) {
          ctx.logoutResolver = done;
          try { terminal.logoutAsync(); } catch (err) { done({ exception: err }); }
        });
      }).then(function () {
        try { if (terminal && terminal.dispose) terminal.dispose(); } catch (_) { /* ignore */ }
        terminal = null;
        ctx = null;
        rn({ type: 'till_closed', requestId: reqId });
      }).catch(function (err) {
        // Even on error, try to dispose and null out so the next openTill
        // can start fresh.
        try { if (terminal && terminal.dispose) terminal.dispose(); } catch (_) { /* ignore */ }
        terminal = null;
        ctx = null;
        rn({ type: 'error', requestId: reqId, message: (err && err.message) || String(err) });
      });
    }
  </script>

  <!--
    timapi.js MUST be in the same folder as this HTML file.
    It fires window.onTimApiReady when loaded and WASM is compiled.
    The src path is relative to this file in Android assets.
  -->
  <script src="timapi.js" onerror="rn({ type: 'error', message: 'timapi.js not found. Place timapi.js and timapi.wasm in apps/mobile/assets/timapi/.' })"></script>
</head>
<body style="background:#000;margin:0;padding:0;"></body>
</html>
