<!DOCTYPE html>
<!--
  ANZ Worldline TIM API v26-01 – Android WebView Bridge
  ======================================================
  Runs inside a hidden WebView in AnzPaymentModal (React Native).
  Loads timapi.js (co-located), connects to the EFTPOS terminal via WebSocket,
  and communicates results back to React Native via window.ReactNativeWebView.postMessage().

  SDK version: 26-01
  Documentation: https://six-tim.github.io/timapi/doc/js/guide.html

  Files required in apps/mobile/assets/timapi/:
    - timapi-bridge.html  (this file)
    - timapi.js           (SDK v26-01 — 715 KB)
    - timapi.wasm         (SDK v26-01 — 3.1 MB)

  ── Message protocol ─────────────────────────────────────────────────────────
  React Native → Bridge (JSON):
    { type: 'purchase',  terminalIp, terminalPort, integratorId, amountCents, referenceId? }
    { type: 'refund',    terminalIp, terminalPort, integratorId, amountCents }
    { type: 'reversal',  terminalIp, terminalPort, integratorId, amountCents }
    { type: 'cancel' }

  Bridge → React Native (JSON):
    { type: 'sdk_ready' }
    { type: 'status',   message: string }
    { type: 'approved', transactionRef, authCode, cardLast4, cardScheme, merchantReceipt, customerReceipt }
    { type: 'declined', declineCode, message }
    { type: 'error',    message }
-->
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    'use strict';

    // ── Notify React Native when WASM is ready ────────────────────────────────
    // MUST be set before <script src="timapi.js"> is loaded.
    window.onTimApiReady = function () {
      rn({ type: 'sdk_ready' });
    };

    // ── Helper: send message to React Native ──────────────────────────────────
    function rn(obj) {
      try {
        window.ReactNativeWebView.postMessage(JSON.stringify(obj));
      } catch (e) {
        console.error('[bridge] postMessage failed', e);
      }
    }

    // ── Active terminal instance ──────────────────────────────────────────────
    var _terminal = null;

    // ── Extract receipts from SDK v26-01 printData ────────────────────────────
    function extractReceipts(printData) {
      var merchant = null, cardholder = null;
      if (!printData || !printData.receipts) return { merchant: merchant, cardholder: cardholder };
      for (var i = 0; i < printData.receipts.length; i++) {
        var r = printData.receipts[i];
        var recipientName = r.recipient && r.recipient.name;
        if (recipientName === 'merchant')   merchant   = r.value || null;
        if (recipientName === 'cardholder') cardholder = r.value || null;
      }
      return { merchant: merchant, cardholder: cardholder };
    }

    // ── Result code to string ─────────────────────────────────────────────────
    function codeStr(code) {
      if (!code) return '';
      if (typeof code === 'string') return code;
      return code.name || String(code);
    }

    // ── Handle commands from React Native ─────────────────────────────────────
    function handleMessage(raw) {
      var msg;
      try { msg = JSON.parse(raw); } catch (e) { return; }

      switch (msg.type) {
        case 'purchase': return startTransaction('purchase', msg);
        case 'refund':   return startTransaction('refund',   msg);
        case 'reversal': return startTransaction('reversal', msg);
        case 'cancel':
          if (_terminal) {
            try {
              // SDK v26-01: cancel() is NOT async — no callback
              _terminal.cancel();
            } catch (e) { /* best-effort */ }
          }
          break;
      }
    }

    // React Native sends messages on 'message' (Android) and 'window.message'
    document.addEventListener('message', function (e) { handleMessage(e.data); });
    window.addEventListener('message',   function (e) { handleMessage(e.data); });

    // ── Transaction flow ──────────────────────────────────────────────────────
    function startTransaction(txType, msg) {
      if (!window.timapi) {
        rn({ type: 'error', message: 'TIM API SDK not loaded. Ensure timapi.js is in assets/timapi/.' });
        return;
      }

      try {
        // ── 1. TerminalSettings ────────────────────────────────────────────
        // All settings must be configured before Terminal construction.
        var settings = new timapi.TerminalSettings();
        settings.connectionIPString = msg.terminalIp;
        settings.connectionIPPort   = msg.terminalPort || 80;
        settings.integratorId       = msg.integratorId || 'd23f66c0-546b-482f-b8b6-cb351f94fd31';
        // ANZ Worldline validation requirements:
        settings.autoCommit         = true;   // auto-commit after approval
        settings.fetchBrands        = true;   // retrieve brands during login
        settings.dcc                = false;  // no DCC in AU
        settings.partialApproval    = false;
        settings.tipAllowed         = false;  // retail guide only
        settings.enableKeepAlive    = true;
        // guides: 'retail' is included by default in the SDK constructor

        // ── 2. Terminal ────────────────────────────────────────────────────
        _terminal = new timapi.Terminal(settings);

        // ── 3. POS ID (max 6 digits per EP2) ──────────────────────────────
        _terminal.setPosId('1');
        _terminal.setUserId(1);

        // ── 4. EcrInfo — software identification ───────────────────────────
        var ecrInfo = new timapi.EcrInfo();
        ecrInfo.type             = timapi.constants.EcrInfoType.ecrApplication;
        ecrInfo.name             = 'ElevatedPOS';
        ecrInfo.manufacturerName = 'ElevatedPOS Pty Ltd';
        ecrInfo.version          = '1.0';
        ecrInfo.integratorSolution = 'ElevatedPOS-ANZ-v26-01';
        _terminal.addEcrData(ecrInfo);

        // ── 5. PrintOptions — POS handles printing, disable terminal print ─
        var merchantOpt = new timapi.PrintOption();
        merchantOpt.recipient = timapi.constants.Recipient.merchant;
        merchantOpt.isEnabled = false;

        var cardholderOpt = new timapi.PrintOption();
        cardholderOpt.recipient = timapi.constants.Recipient.cardholder;
        cardholderOpt.isEnabled = false;

        _terminal.setPrintOptions([merchantOpt, cardholderOpt]);

        // ── 6. Listener ────────────────────────────────────────────────────
        _terminal.addListener({
          transactionCompleted: function (event, data) {
            if (event.exception === undefined) {
              // Approved
              var trxInfo = data.transactionInformation || {};
              var cardData = data.cardData || {};
              var rcpts    = extractReceipts(data.printData);

              var cardLast4 = (cardData.cardNumberPrintable || cardData.cardNumberPrintableCardholder || '').slice(-4) || null;

              rn({
                type:            'approved',
                transactionRef:  trxInfo.trmTransRef  || null,
                authCode:        trxInfo.authCode      || null,
                cardLast4:       cardLast4,
                cardScheme:      cardData.brandName    || null,
                merchantReceipt: rcpts.merchant,
                customerReceipt: rcpts.cardholder,
              });
            } else {
              // Declined / error — decline receipts may be in exception.printData
              var rcpts = extractReceipts(event.exception.printData);
              rn({
                type:            'declined',
                declineCode:     codeStr(event.exception.resultCode),
                message:         event.exception.message || ('Declined (' + codeStr(event.exception.resultCode) + ')'),
                merchantReceipt: rcpts.merchant,
                customerReceipt: rcpts.cardholder,
              });
            }
            _terminal = null;
          },

          connectCompleted: function (event) {
            if (event.exception === undefined) {
              rn({ type: 'status', message: 'Terminal connected' });
            }
          },

          loginCompleted: function (event) {
            if (event.exception === undefined) {
              rn({ type: 'status', message: 'Terminal ready' });
            }
          },

          activateCompleted: function (event) {
            if (event.exception === undefined) {
              rn({ type: 'status', message: 'Terminal activated' });
            }
          },

          terminalStatusChanged: function (terminal) {
            try {
              var status = terminal.getTerminalStatus();
              if (status) {
                var s = String(status);
                if (s && s !== 'undefined' && s !== '[object Object]') {
                  rn({ type: 'status', message: s });
                }
              }
            } catch (e) { /* non-fatal */ }
          },
        });

        // ── 7. Start transaction ───────────────────────────────────────────
        // Pre-automatisms handle connect → login → activate automatically.
        // transactionAsync(type, amount) — only 2 args in SDK v26-01
        rn({ type: 'status', message: 'Connecting to terminal\u2026' });

        var txTypeEnum;
        if (txType === 'refund') {
          // ANZ TIM API: refund = 'credit' (NOT 'refund')
          txTypeEnum = timapi.constants.TransactionType.credit;
        } else if (txType === 'reversal') {
          txTypeEnum = timapi.constants.TransactionType.reversal;
        } else {
          txTypeEnum = timapi.constants.TransactionType.purchase;
        }

        _terminal.transactionAsync(
          txTypeEnum,
          new timapi.Amount(msg.amountCents, timapi.constants.Currency.AUD)
        );

      } catch (e) {
        rn({ type: 'error', message: e && e.message ? e.message : String(e) });
        _terminal = null;
      }
    }
  </script>

  <!--
    timapi.js MUST be in the same folder as this HTML file.
    It fires window.onTimApiReady when the WASM module finishes compiling.
    The src path is relative to this file in Android assets.
    SDK version: 26-01
  -->
  <script
    src="timapi.js"
    onerror="rn({ type: 'error', message: 'timapi.js not found. Ensure timapi.js and timapi.wasm (v26-01) are in apps/mobile/assets/timapi/.' })"
  ></script>
</head>
<body style="background:#000;margin:0;padding:0;"></body>
</html>
