<!DOCTYPE html>
<!--
  ANZ Worldline TIM API – Android WebView Bridge
  ================================================
  This page runs inside a hidden WebView in AnzPaymentModal /
  AnzPairingModal. It loads timapi.js (co-located in this folder),
  connects to the EFTPOS terminal via WebSocket, and reports results
  back to React Native via window.ReactNativeWebView.postMessage().

  Files required in apps/mobile/assets/timapi/:
    - timapi-bridge.html  (this file)
    - timapi.js           (obtain from ANZ Worldline portal)
    - timapi.wasm         (obtain from ANZ Worldline portal)

  Portal: https://start.portal.anzworldline-solutions.com.au/

  Supported messages from React Native:
    { type: 'pair',     terminalIp, terminalPort, integratorId? }
    { type: 'purchase', terminalIp, terminalPort, integratorId?, amountCents, referenceId? }
    { type: 'cancel' }
-->
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    // Notify React Native when the page is ready to receive commands
    window.onTimApiReady = function () {
      rn({ type: 'sdk_ready' });
    };

    // Helper — send JSON message to React Native
    function rn(obj) {
      try {
        window.ReactNativeWebView.postMessage(JSON.stringify(obj));
      } catch (e) {
        console.error('postMessage failed', e);
      }
    }

    var terminal = null;

    // ── Handle commands from React Native ──────────────────────────────────────
    function handleMessage(raw) {
      var msg;
      try { msg = JSON.parse(raw); } catch (_) { return; }

      if (msg.type === 'pair') {
        startPair(msg);
      } else if (msg.type === 'purchase') {
        startPurchase(msg);
      } else if (msg.type === 'cancel') {
        if (terminal) {
          try { terminal.cancelAsync(); } catch (e) { /* ignore */ }
        }
      }
    }

    // React Native sends messages via injectedJavaScript — listen on document
    document.addEventListener('message', function (e) { handleMessage(e.data); });
    // Android fires on window
    window.addEventListener('message', function (e) { handleMessage(e.data); });

    // ── Pair flow (Connect → Login → Activate) ─────────────────────────────────
    // Mirrors apps/web-backoffice/lib/payments/anz-pair-lifecycle.ts: each step
    // is awaited from a fresh event-loop tick, never re-entered from inside a
    // *Completed callback (which has been observed to make the SDK abandon the
    // session with timCommunicationFailure on Castles S1F2 firmware).
    function startPair(msg) {
      if (!window.timapi) {
        rn({ type: 'error', message: 'TIM API SDK not loaded. Place timapi.js in assets/timapi/.' });
        return;
      }

      try {
        var settings = new timapi.TerminalSettings();
        settings.connectionIPString = msg.terminalIp;
        settings.connectionIPPort   = msg.terminalPort || 7784;
        settings.fetchBrands        = false;
        settings.autoCommit         = false;

        terminal = new timapi.Terminal(settings);
        terminal.setPosId('12');
        terminal.setUserId(1);

        // Per-step promise resolvers, wired into a single listener.
        // The listener just records events and resolves whichever promise is
        // currently awaiting. It does NOT call xxxAsync() — that happens in
        // the outer code, between awaits.
        var connectResolver  = null;
        var loginResolver    = null;
        var activateResolver = null;
        var disconnectHandler = null;

        function FlowListener() { timapi.DefaultTerminalListener.call(this); }
        FlowListener.prototype = Object.create(timapi.DefaultTerminalListener.prototype);
        FlowListener.prototype.connectCompleted = function (event) {
          timapi.DefaultTerminalListener.prototype.connectCompleted.call(this, event);
          var r = connectResolver; connectResolver = null;
          if (r) r(event);
        };
        FlowListener.prototype.loginCompleted = function (event) {
          timapi.DefaultTerminalListener.prototype.loginCompleted.call(this, event);
          var r = loginResolver; loginResolver = null;
          if (r) r(event);
        };
        FlowListener.prototype.activateCompleted = function (event, data) {
          timapi.DefaultTerminalListener.prototype.activateCompleted.call(this, event, data);
          var r = activateResolver; activateResolver = null;
          if (r) r(event);
        };
        FlowListener.prototype.disconnected = function (t, exception) {
          timapi.DefaultTerminalListener.prototype.disconnected.call(this, t, exception);
          var h = disconnectHandler; disconnectHandler = null;
          if (h) h(exception);
        };

        terminal.addListener(new FlowListener());

        function runStep(label, timeoutMs, setup) {
          return new Promise(function (resolve, reject) {
            var settled = false;
            var timer = setTimeout(function () {
              if (settled) return;
              settled = true;
              reject(new Error(label + ' timed out after ' + Math.round(timeoutMs / 1000) + 's'));
            }, timeoutMs);

            var done = function (event) {
              if (settled) return;
              settled = true;
              clearTimeout(timer);
              if (event && event.exception !== undefined) {
                reject(new Error((event.exception && event.exception.message) || (label + ' failed')));
                return;
              }
              resolve(event);
            };

            disconnectHandler = function (exception) {
              if (settled) return;
              settled = true;
              clearTimeout(timer);
              reject(new Error((exception && exception.message) || ('Terminal disconnected during ' + label)));
            };

            setup(done);
          });
        }

        rn({ type: 'status', message: 'Connecting…' });
        runStep('Connect', 15000, function (done) {
          connectResolver = done;
          terminal.connectAsync();
        }).then(function () {
          rn({ type: 'status', message: 'Logging in…' });
          // 60s accommodates the internal FeatureRequest retry observed on
          // Castles S1F2 firmware.
          return runStep('Login', 60000, function (done) {
            loginResolver = done;
            terminal.loginAsync();
          });
        }).then(function () {
          rn({ type: 'status', message: 'Activating…' });
          return runStep('Activate', 30000, function (done) {
            activateResolver = done;
            terminal.activateAsync();
          });
        }).then(function () {
          rn({ type: 'paired' });
          // Pair is one-shot: dispose the terminal so a fresh one is created
          // next time. Holding it open here just leaks WASM memory.
          try { if (terminal && terminal.dispose) terminal.dispose(); } catch (_) { /* ignore */ }
          terminal = null;
        }).catch(function (err) {
          rn({ type: 'error', message: (err && err.message) || String(err) });
          try { if (terminal && terminal.dispose) terminal.dispose(); } catch (_) { /* ignore */ }
          terminal = null;
        });
      } catch (e) {
        rn({ type: 'error', message: (e && e.message) || String(e) });
        terminal = null;
      }
    }

    // ── Purchase flow ──────────────────────────────────────────────────────────
    // Runs the full lifecycle: Connect → Login → Activate → Transaction → Commit.
    // The Castles S1F2 rejects transactions on non-activated sessions with
    // `invalidArgument` — so we always drive the SDK through the four-step
    // pair before issuing the purchase, mirroring the browser-side
    // anz-pair-lifecycle.ts pattern.
    function startPurchase(msg) {
      if (!window.timapi) {
        rn({ type: 'error', message: 'TIM API SDK not loaded. Place timapi.js in assets/timapi/.' });
        return;
      }

      try {
        var settings = new timapi.TerminalSettings();
        settings.connectionIPString = msg.terminalIp;
        settings.connectionIPPort   = msg.terminalPort || 7784;
        settings.fetchBrands        = false;
        settings.autoCommit         = false;
        // integratorId is only set when a non-empty string was supplied. The
        // SDK validates and rejects empty strings with `invalidArgument`.
        if (msg.integratorId && typeof msg.integratorId === 'string' && msg.integratorId.length > 0) {
          settings.integratorId = msg.integratorId;
        }

        terminal = new timapi.Terminal(settings);
        terminal.setPosId('12');
        terminal.setUserId(1);

        // Per-step promise resolvers + shared listener (same pattern as startPair).
        var connectResolver    = null;
        var loginResolver      = null;
        var activateResolver   = null;
        var txResolver         = null;
        var disconnectHandler  = null;

        function FlowListener() { timapi.DefaultTerminalListener.call(this); }
        FlowListener.prototype = Object.create(timapi.DefaultTerminalListener.prototype);
        FlowListener.prototype.connectCompleted = function (event) {
          timapi.DefaultTerminalListener.prototype.connectCompleted.call(this, event);
          var r = connectResolver; connectResolver = null;
          if (r) r(event);
        };
        FlowListener.prototype.loginCompleted = function (event) {
          timapi.DefaultTerminalListener.prototype.loginCompleted.call(this, event);
          var r = loginResolver; loginResolver = null;
          if (r) r(event);
        };
        FlowListener.prototype.activateCompleted = function (event, data) {
          timapi.DefaultTerminalListener.prototype.activateCompleted.call(this, event, data);
          var r = activateResolver; activateResolver = null;
          if (r) r(event);
        };
        FlowListener.prototype.transactionCompleted = function (event, data) {
          timapi.DefaultTerminalListener.prototype.transactionCompleted.call(this, event, data);
          var r = txResolver; txResolver = null;
          if (r) r({ event: event, data: data });
        };
        FlowListener.prototype.displayTextChanged = function (event, data) {
          timapi.DefaultTerminalListener.prototype.displayTextChanged.call(this, event, data);
          var text = (data && data.text) ? String(data.text).trim() : '';
          if (text) rn({ type: 'status', message: text });
        };
        FlowListener.prototype.disconnected = function (t, exception) {
          timapi.DefaultTerminalListener.prototype.disconnected.call(this, t, exception);
          var h = disconnectHandler; disconnectHandler = null;
          if (h) h(exception);
        };

        terminal.addListener(new FlowListener());

        function runStep(label, timeoutMs, setup) {
          return new Promise(function (resolve, reject) {
            var settled = false;
            var timer = setTimeout(function () {
              if (settled) return;
              settled = true;
              reject(new Error(label + ' timed out after ' + Math.round(timeoutMs / 1000) + 's'));
            }, timeoutMs);

            var done = function (eventOrWrapper) {
              if (settled) return;
              settled = true;
              clearTimeout(timer);
              var event = (eventOrWrapper && eventOrWrapper.event) ? eventOrWrapper.event : eventOrWrapper;
              if (event && event.exception !== undefined) {
                reject(new Error((event.exception && event.exception.message) || (label + ' failed')));
                return;
              }
              resolve(eventOrWrapper);
            };

            disconnectHandler = function (exception) {
              if (settled) return;
              settled = true;
              clearTimeout(timer);
              reject(new Error((exception && exception.message) || ('Terminal disconnected during ' + label)));
            };

            setup(done);
          });
        }

        rn({ type: 'status', message: 'Connecting\u2026' });
        runStep('Connect', 15000, function (done) {
          connectResolver = done;
          terminal.connectAsync();
        }).then(function () {
          rn({ type: 'status', message: 'Logging in\u2026' });
          return runStep('Login', 60000, function (done) {
            loginResolver = done;
            terminal.loginAsync();
          });
        }).then(function () {
          rn({ type: 'status', message: 'Activating\u2026' });
          return runStep('Activate', 30000, function (done) {
            activateResolver = done;
            terminal.activateAsync();
          });
        }).then(function () {
          rn({ type: 'status', message: 'Present card\u2026' });
          return runStep('Transaction', 180000, function (done) {
            txResolver = done;
            terminal.transactionAsync(
              timapi.constants.TransactionType.purchase,
              new timapi.Amount(msg.amountCents, timapi.constants.Currency.AUD),
              (msg.referenceId && typeof msg.referenceId === 'string') ? msg.referenceId : undefined
            );
          });
        }).then(function (wrapper) {
          var event = wrapper && wrapper.event;
          var data  = wrapper && wrapper.data;
          // Approved — commit, then report
          try { terminal.commitAsync(); } catch (_) { /* non-fatal */ }
          rn({
            type:            'approved',
            transactionRef:  (data && data.transactionReference) || null,
            authCode:        (data && data.authorisationCode)    || null,
            maskedPan:       (data && data.maskedPan)            || null,
            cardType:        (data && data.cardType)             || null,
            rrn:             (data && data.rrn)                  || null,
            merchantReceipt: (data && (data.merchantReceiptText || data.receiptText)) || null,
            customerReceipt: (data && data.customerReceiptText) || null,
          });
          // Leave terminal alive for subsequent transactions — dispose only
          // when the WebView unloads.
        }).catch(function (err) {
          var msg2 = (err && err.message) || String(err);
          // If the exception carries a declineCode-like field (rare), surface
          // it as declined; otherwise it's a generic error that should not be
          // reported as a decline (which would log a bogus transaction).
          rn({ type: 'error', message: msg2 });
          try { if (terminal && terminal.dispose) terminal.dispose(); } catch (_) { /* ignore */ }
          terminal = null;
        });
      } catch (e) {
        rn({ type: 'error', message: (e && e.message) || String(e) });
        try { if (terminal && terminal.dispose) terminal.dispose(); } catch (_) { /* ignore */ }
        terminal = null;
      }
    }
  </script>

  <!--
    timapi.js MUST be in the same folder as this HTML file.
    It fires window.onTimApiReady when loaded and WASM is compiled.
    The src path is relative to this file in Android assets.
  -->
  <script src="timapi.js" onerror="rn({ type: 'error', message: 'timapi.js not found. Place timapi.js and timapi.wasm in apps/mobile/assets/timapi/.' })"></script>
</head>
<body style="background:#000;margin:0;padding:0;"></body>
</html>
