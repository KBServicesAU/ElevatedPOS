<!DOCTYPE html>
<!--
  ANZ Worldline TIM API – Android WebView Bridge
  ================================================
  This page runs inside a hidden WebView (AnzBridgeHost) for the life
  of the POS session. It loads timapi.js (co-located in this folder),
  connects to the EFTPOS terminal via WebSocket (SIXml), and reports
  results back to React Native via window.ReactNativeWebView.postMessage().

  Files required in apps/mobile/assets/timapi/:
    - timapi-bridge.html  (this file)
    - timapi.js           (obtain from ANZ Worldline portal)
    - timapi.wasm         (obtain from ANZ Worldline portal)

  Portal: https://start.portal.anzworldline-solutions.com.au/

  Supported commands from React Native:
    { type: 'open_till',   requestId, terminalIp, terminalPort, integratorId? }
    { type: 'transaction', requestId, amountCents, referenceId? }
    { type: 'refund',      requestId, amountCents, referenceId? }
    { type: 'reversal',    requestId, originalTransactionRef? }
    { type: 'reconcile',   requestId }
    { type: 'close_till',  requestId }
    { type: 'cancel' }

  Responses carry the requestId back so the RN host can resolve the
  matching promise.
-->
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    // Notify React Native when the page is ready to receive commands
    window.onTimApiReady = function () {
      rn({ type: 'sdk_ready' });
    };

    // Helper — send JSON message to React Native
    function rn(obj) {
      try {
        window.ReactNativeWebView.postMessage(JSON.stringify(obj));
      } catch (e) {
        console.error('postMessage failed', e);
      }
    }

    // Shared state — persists across commands for the life of the page.
    var terminal = null;
    // The active lifecycle context (holds the per-step resolvers).
    var ctx = null;

    // ── Handle commands from React Native ──────────────────────────────────────
    function handleMessage(raw) {
      var msg;
      try { msg = JSON.parse(raw); } catch (_) { return; }

      if (msg.type === 'open_till') {
        openTill(msg);
      } else if (msg.type === 'transaction') {
        runTransaction(msg);
      } else if (msg.type === 'refund') {
        runRefund(msg);
      } else if (msg.type === 'reversal') {
        runReversal(msg);
      } else if (msg.type === 'reconcile') {
        runReconciliation(msg);
      } else if (msg.type === 'close_till') {
        closeTill(msg);
      } else if (msg.type === 'force_reset') {
        // Operator-triggered escape hatch when a lifecycle step hangs
        // (e.g. Activate stuck). Dispose any live terminal handle and
        // clear the shared ctx so the next open_till starts from a
        // clean slate. Unlike close_till this does NOT try to talk to
        // the terminal first — it's a local cleanup only.
        if (terminal) {
          try { if (typeof terminal.cancel === 'function') terminal.cancel(); } catch (_) { /* ignore */ }
          try { terminal.dispose(); } catch (_) { /* ignore */ }
        }
        terminal = null;
        ctx = null;
        rn({ type: 'status', message: 'Bridge reset' });
      } else if (msg.type === 'cancel') {
        // The TIM API SDK exposes `terminal.cancel()` (synchronous, no
        // Async suffix). Previous versions of this bridge called
        // `cancelAsync()` which doesn't exist on the Terminal prototype —
        // the undefined-is-not-a-function error was caught and silently
        // ignored, so the terminal kept showing the amount. Defensive:
        // try both names in case a future SDK build adds Async back.
        if (terminal) {
          var attempted = '';
          var names = ['cancel', 'cancelAsync', 'abort', 'abortAsync'];
          for (var i = 0; i < names.length; i++) {
            var fn = terminal[names[i]];
            if (typeof fn === 'function') {
              try { fn.call(terminal); attempted = names[i]; break; } catch (_) { /* try next */ }
            }
          }
          rn({ type: 'status', message: attempted ? ('Cancel sent (' + attempted + ')') : 'Cancel not supported by SDK' });
        } else {
          rn({ type: 'status', message: 'Cancel ignored — no active terminal' });
        }
      }
    }

    // React Native sends messages via injectedJavaScript — listen on document
    document.addEventListener('message', function (e) { handleMessage(e.data); });
    // Android fires on window
    window.addEventListener('message', function (e) { handleMessage(e.data); });

    // ── Helper: extract cardholder + merchant receipts from an SDK payload ──
    // The TIM API SDK delivers receipts as:
    //   data.receipts            → Receipt[]   (on commit / dcc results)
    //   data.printData.receipts  → Receipt[]   (on activate / transaction results)
    // Each Receipt = { recipient: 'cardholder' | 'merchant' | 'both', value: string }
    //
    // Earlier versions of this bridge looked for
    // `data.merchantReceiptText` / `data.customerReceiptText` which never
    // existed in the SDK — so merchant/customer receipts always came back
    // as null. This helper is the single source of truth.
    function extractReceipts(data) {
      var arr = null;
      if (data && Array.isArray(data.receipts)) arr = data.receipts;
      else if (data && data.printData && Array.isArray(data.printData.receipts)) arr = data.printData.receipts;
      if (!arr) return { merchant: null, customer: null };
      var merchant = null, customer = null;
      for (var i = 0; i < arr.length; i++) {
        var r = arr[i] || {};
        var recip = String(r.recipient || '').toLowerCase();
        var text  = typeof r.value === 'string' ? r.value : '';
        if (!text) continue;
        if (recip === 'merchant' || recip === 'both') {
          if (!merchant) merchant = text; else merchant += '\n' + text;
        }
        if (recip === 'cardholder' || recip === 'both') {
          if (!customer) customer = text; else customer += '\n' + text;
        }
      }
      return { merchant: merchant, customer: customer };
    }

    // Merge two {merchant, customer} pairs. Newline-joins when both sides
    // supplied a value so we don't drop receipt text that arrived via
    // receiptGenerated() and via transactionCompleted().
    function mergeReceipts(a, b) {
      function join(x, y) {
        if (!x) return y || null;
        if (!y) return x || null;
        if (x === y) return x;
        return x + '\n' + y;
      }
      return {
        merchant: join(a && a.merchant, b && b.merchant),
        customer: join(a && a.customer, b && b.customer),
      };
    }

    // ── Helper: build a listener object that resolves step-promises ─────────
    // NOTE: timapi.DefaultTerminalListener is an ES6 class in the SDK.
    // Trying to extend it via the ES5 prototype pattern
    // (`function Foo(){ Base.call(this); }`) throws
    // "Class constructors cannot be invoked with 'new'" on Hermes because
    // ES6 classes can't be invoked without `new`.
    //
    // terminal.addListener() accepts a plain object with method callbacks —
    // that's what the ANZ samples use and is the portable, version-safe way.
    function makeFlowListener(c) {
      return {
        connectCompleted: function (event) {
          var r = c.connectResolver; c.connectResolver = null;
          if (r) r(event);
        },
        loginCompleted: function (event) {
          var r = c.loginResolver; c.loginResolver = null;
          if (r) r(event);
        },
        activateCompleted: function (event, data) {
          var r = c.activateResolver; c.activateResolver = null;
          if (r) r({ event: event, data: data });
        },
        deactivateCompleted: function (event, data) {
          var r = c.deactivateResolver; c.deactivateResolver = null;
          if (r) r({ event: event, data: data });
        },
        logoutCompleted: function (event) {
          var r = c.logoutResolver; c.logoutResolver = null;
          if (r) r(event);
        },
        transactionCompleted: function (event, data) {
          var r = c.txResolver; c.txResolver = null;
          if (r) r({ event: event, data: data });
        },
        reconciliationCompleted: function (event, data) {
          var r = c.reconcileResolver; c.reconcileResolver = null;
          if (r) r({ event: event, data: data });
        },
        displayTextChanged: function (event, data) {
          var text = (data && data.text) ? String(data.text).trim() : '';
          if (text) rn({ type: 'status', message: text });
        },
        connectionStateChanged: function () {
          // No-op — we drive state via the per-step promises above.
        },
        receiptGenerated: function (_event, data) {
          // Some SDK builds deliver receipts via this callback in addition
          // to (or instead of) the transactionCompleted payload. Collect any
          // that arrive here so runTransaction can merge them before
          // resolving. The primary path is still data.receipts /
          // data.printData.receipts on transactionCompleted — this is
          // defensive only.
          try {
            var extracted = extractReceipts(data);
            if (extracted.merchant || extracted.customer) {
              if (!c.pendingReceipts) c.pendingReceipts = [];
              c.pendingReceipts.push(extracted);
            }
          } catch (_) { /* ignore */ }
        },
        disconnected: function (_t, exception) {
          var h = c.disconnectHandler; c.disconnectHandler = null;
          if (h) h(exception);
        }
      };
    }

    // ── Helper: parse the TIM API exception structure into a flat object ───
    // TimException.toString() returns something like:
    //   "timapi.TimExeption(declinedNotSupported:Authorization declined 0 Not supported)"
    // where the first token inside the parens is the *category* — critical
    // because it distinguishes a real card decline from "transaction type /
    // card brand not supported". The SDK object also exposes these as
    // properties (.resultCode, .result, .errorCategory depending on build)
    // but their names are unstable across SDK versions, so we parse the
    // string as a safe fallback.
    function extractTimError(exception) {
      var category = null;
      var code = null;
      var message = null;
      if (exception) {
        // Direct property access — preferred when available.
        if (exception.errorCategory) category = String(exception.errorCategory);
        if (exception.result) category = category || String(exception.result);
        if (exception.resultCode !== undefined && exception.resultCode !== null) code = Number(exception.resultCode);
        if (exception.message) message = String(exception.message);

        // Fallback: parse toString() output.
        var raw = (typeof exception.toString === 'function') ? exception.toString() : String(exception);
        if (!category) {
          var m = /\(([a-zA-Z]+)\s*[:,]/.exec(raw);
          if (m) category = m[1];
        }
        if (!message) {
          var m2 = /\(.+?[:,]\s*(.+)\)\s*$/.exec(raw);
          if (m2) message = m2[1].trim();
        }
        if (!message) message = raw;
      }
      return {
        category: category || 'unknown',
        code: (code === null || isNaN(code)) ? null : code,
        message: message || 'Terminal error',
      };
    }

    // ── Helper: run a single SDK step as a promise with per-step timeout ───
    // The error carries (category, code, message, step) so the RN host can
    // show richer feedback than a single flattened string — critical for
    // distinguishing a real decline from declinedNotSupported.
    function runStep(c, label, timeoutMs, setup, onProgress) {
      return new Promise(function (resolve, reject) {
        var settled = false;
        var startMs = Date.now();
        var progressTimer = null;

        var finish = function (err, value) {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          if (progressTimer) clearInterval(progressTimer);
          if (err) reject(err); else resolve(value);
        };

        var timer = setTimeout(function () {
          var e = new Error(label + ' timed out after ' + Math.round(timeoutMs / 1000) + 's');
          e.timedOut = true;
          e.step = label;
          finish(e);
        }, timeoutMs);

        if (typeof onProgress === 'function') {
          progressTimer = setInterval(function () {
            var elapsed = Math.round((Date.now() - startMs) / 1000);
            try { onProgress(label, elapsed, Math.round(timeoutMs / 1000)); } catch (_) { /* ignore */ }
          }, 2000);
        }

        var done = function (eventOrWrapper) {
          var event = (eventOrWrapper && eventOrWrapper.event) ? eventOrWrapper.event : eventOrWrapper;
          if (event && event.exception !== undefined) {
            var info = extractTimError(event.exception);
            var e = new Error(info.message);
            e.category = info.category;
            e.code = info.code;
            e.step = label;
            finish(e);
            return;
          }
          finish(null, eventOrWrapper);
        };

        c.disconnectHandler = function (exception) {
          var info = extractTimError(exception);
          var e = new Error(info.message || ('Terminal disconnected during ' + label));
          e.category = info.category || 'disconnected';
          e.code = info.code;
          e.step = label;
          e.disconnected = true;
          finish(e);
        };

        setup(done);
      });
    }

    // Build a rich error payload for RN. Includes `category` and `code` so
    // the POS can show the correct decline / error message without regex
    // matching on the string.
    function errorPayload(reqId, err, fallbackStep) {
      return {
        type: 'error',
        requestId: reqId,
        message: (err && err.message) || String(err) || 'Terminal error',
        category: (err && err.category) || null,
        code: (err && err.code) !== undefined ? err.code : null,
        step: (err && err.step) || fallbackStep || null,
        timedOut: !!(err && err.timedOut),
        disconnected: !!(err && err.disconnected),
      };
    }

    function makeCtx() {
      return {
        connectResolver:     null,
        loginResolver:       null,
        activateResolver:    null,
        deactivateResolver:  null,
        logoutResolver:      null,
        txResolver:          null,
        reconcileResolver:   null,
        disconnectHandler:   null,
        // Receipts that arrive asynchronously via receiptGenerated during a
        // transaction — merged with the transactionCompleted payload before
        // we resolve the tx promise. Cleared at the start of each tx.
        pendingReceipts:     null,
      };
    }

    // ── Open Till: Connect → Login → Activate ──────────────────────────────
    function openTill(msg) {
      var reqId = msg.requestId;
      if (!window.timapi) {
        rn({ type: 'error', requestId: reqId, message: 'TIM API SDK not loaded. Place timapi.js in assets/timapi/.' });
        return;
      }
      // Idempotent — if a terminal is already alive (e.g. the RN host
      // called open_till as a self-heal after a remount but the previous
      // WebView still had a live handle in scope), dispose it and start
      // fresh so we always end in a known-good activated state.
      if (terminal) {
        try { terminal.dispose(); } catch (_) { /* ignore */ }
        terminal = null;
        ctx = null;
      }

      try {
        var settings = new timapi.TerminalSettings();
        settings.connectionIPString = msg.terminalIp;
        settings.connectionIPPort   = msg.terminalPort || 7784;
        settings.fetchBrands        = false;
        settings.autoCommit         = false;
        if (msg.integratorId && typeof msg.integratorId === 'string' && msg.integratorId.length > 0) {
          settings.integratorId = msg.integratorId;
        }

        terminal = new timapi.Terminal(settings);
        terminal.setPosId('12');
        terminal.setUserId(1);

        ctx = makeCtx();
        terminal.addListener(makeFlowListener(ctx));

        // Progress reporter so the RN host can show "Logging in… (0:12 / 1:00)"
        // instead of a frozen spinner. Fires every 2s per step.
        var progress = function (label, elapsed, timeoutSec) {
          rn({ type: 'progress', step: label, elapsed: elapsed, timeout: timeoutSec });
        };

        // v2.7.32 — some TimException categories indicate the terminal is
        // ALREADY in the requested state, not a failure. Treat those as
        // success so a stale session from a previous WebView instance
        // doesn't wedge us forever on Login or Activate. We recognize the
        // category via extractTimError() (runStep bubbles it on e.category)
        // and also tolerate these textual fingerprints so we're
        // bullet-proof across SDK versions.
        function isAlreadyInState(err, stateNames) {
          if (!err) return false;
          var cat = String(err.category || '').toLowerCase();
          var msg = String(err.message || '').toLowerCase();
          for (var i = 0; i < stateNames.length; i++) {
            var name = String(stateNames[i]).toLowerCase();
            // Common SDK variants: "alreadyLoggedIn", "alreadyActivated",
            // "alreadyConnected", "loggedIn", "activated", etc.
            if (cat.indexOf('already' + name) !== -1) return true;
            if (cat === name) return true;
            if (msg.indexOf('already ' + name) !== -1) return true;
            if (msg.indexOf(name + ' already') !== -1) return true;
          }
          return false;
        }

        // Resilient step wrapper: if a step rejects with an "already in
        // state" error, treat it as success so openTill can proceed.
        function tolerantStep(label, timeoutMs, setup, alreadyStates) {
          return runStep(ctx, label, timeoutMs, setup, progress).catch(function (err) {
            if (isAlreadyInState(err, alreadyStates)) {
              rn({ type: 'status', message: label + ' already done — skipping' });
              return null; // resolve the chain
            }
            throw err; // real failure
          });
        }

        rn({ type: 'status', message: 'Connecting\u2026' });
        tolerantStep('Connect', 15000, function (done) {
          ctx.connectResolver = done;
          try { terminal.connectAsync(); } catch (err) { done({ exception: err }); }
        }, ['connected']).then(function () {
          rn({ type: 'status', message: 'Logging in\u2026' });
          return tolerantStep('Login', 60000, function (done) {
            ctx.loginResolver = done;
            try { terminal.loginAsync(); } catch (err) { done({ exception: err }); }
          }, ['loggedIn', 'login']);
        }).then(function () {
          rn({ type: 'status', message: 'Activating\u2026' });
          return tolerantStep('Activate', 45000, function (done) {
            ctx.activateResolver = done;
            try { terminal.activateAsync(); } catch (err) { done({ exception: err }); }
          }, ['activated', 'activate']);
        }).then(function () {
          // v2.7.23 — read the real capability bits from the Terminal after
          // activation. These are set by the acquirer-level merchant config
          // on the ANZ side; surfacing them lets the POS reflect the true
          // state of the terminal (e.g. is surcharging enabled?) instead of
          // relying on a local toggle that nothing actually reads.
          var capabilities = {
            canSurcharge: false,
            canTip: false,
            canCashback: false,
            canReservation: false,
            canReceiptRequest: false,
            maxAmount: null
          };
          try { if (typeof terminal.canSurcharge === 'function') capabilities.canSurcharge = !!terminal.canSurcharge(); } catch (_) {}
          try { if (typeof terminal.canTip       === 'function') capabilities.canTip       = !!terminal.canTip(); } catch (_) {}
          try { if (typeof terminal.canCashback  === 'function') capabilities.canCashback  = !!terminal.canCashback(); } catch (_) {}
          try { if (typeof terminal.canReservation === 'function') capabilities.canReservation = !!terminal.canReservation(); } catch (_) {}
          try { if (typeof terminal.canReceiptRequest === 'function') capabilities.canReceiptRequest = !!terminal.canReceiptRequest(); } catch (_) {}
          rn({ type: 'till_opened', requestId: reqId, capabilities: capabilities });
          // Keep the terminal alive for subsequent transactions.
        }).catch(function (err) {
          // v2.7.32 — before we tear down, gather a diagnostic snapshot of
          // what the SDK thinks the terminal is doing. If the operator
          // hits "Retry" right after this failure, the status log now
          // carries these breadcrumbs so we can spot wedged states
          // (e.g. "connected=true, loggedIn=true, activated=false" means
          // activate is the actual bottleneck).
          var diag = [];
          try {
            if (terminal) {
              try { if (typeof terminal.isConnected  === 'function') diag.push('connected=' + !!terminal.isConnected()); } catch (_) {}
              try { if (typeof terminal.isLoggedIn   === 'function') diag.push('loggedIn='  + !!terminal.isLoggedIn()); } catch (_) {}
              try { if (typeof terminal.isActivated  === 'function') diag.push('activated=' + !!terminal.isActivated()); } catch (_) {}
              try { if (typeof terminal.getState     === 'function') diag.push('state='     + String(terminal.getState())); } catch (_) {}
            }
          } catch (_) { /* ignore */ }
          if (diag.length > 0) {
            rn({ type: 'status', message: 'Terminal state: ' + diag.join(', ') });
          }
          rn(errorPayload(reqId, err, 'OpenTill'));
          try { if (terminal && terminal.dispose) terminal.dispose(); } catch (_) { /* ignore */ }
          terminal = null;
          ctx = null;
        });
      } catch (e) {
        rn(errorPayload(reqId, e, 'OpenTill'));
        try { if (terminal && terminal.dispose) terminal.dispose(); } catch (_) { /* ignore */ }
        terminal = null;
        ctx = null;
      }
    }

    // ── Transaction (requires open till): transactionAsync → commitAsync ───
    function runTransaction(msg) {
      var reqId = msg.requestId;
      if (!terminal || !ctx) {
        rn({ type: 'error', requestId: reqId, message: 'Till is not open' });
        return;
      }

      // Reset receipt buffer for this transaction so receiptGenerated events
      // from a previous tx don't bleed in.
      ctx.pendingReceipts = [];

      try {
        rn({ type: 'status', message: 'Present card\u2026' });
        runStep(ctx, 'Transaction', 180000, function (done) {
          ctx.txResolver = done;
          terminal.transactionAsync(
            timapi.constants.TransactionType.purchase,
            new timapi.Amount(msg.amountCents, timapi.constants.Currency.AUD),
            (msg.referenceId && typeof msg.referenceId === 'string') ? msg.referenceId : undefined
          );
        }).then(function (wrapper) {
          var data = wrapper && wrapper.data;
          try { terminal.commitAsync(); } catch (_) { /* non-fatal */ }

          // Primary extraction from transactionCompleted payload.
          var receipts = extractReceipts(data);
          // Fold in anything collected via receiptGenerated callbacks.
          var pending = ctx.pendingReceipts || [];
          for (var i = 0; i < pending.length; i++) {
            receipts = mergeReceipts(receipts, pending[i]);
          }
          ctx.pendingReceipts = null;

          rn({
            type:            'approved',
            requestId:       reqId,
            transactionRef:  (data && data.transactionReference) || null,
            authCode:        (data && data.authorisationCode)    || null,
            maskedPan:       (data && data.maskedPan)            || null,
            cardType:        (data && data.cardType)             || null,
            rrn:             (data && data.rrn)                  || null,
            merchantReceipt: receipts.merchant,
            customerReceipt: receipts.customer,
          });
          // Leave terminal alive for subsequent transactions.
        }).catch(function (err) {
          if (ctx) ctx.pendingReceipts = null;
          // Transaction failures are NOT fatal to the till session — the
          // terminal stays alive so the operator can retry.
          rn(errorPayload(reqId, err, 'Transaction'));
        });
      } catch (e) {
        rn(errorPayload(reqId, e, 'Transaction'));
      }
    }

    // ── Refund (requires open till) ────────────────────────────────────────
    // Runs a standalone refund via TransactionType.credit. The SDK's
    // "credit" enum value IS the TIM API refund primitive — running
    // `transactionAsync(credit, amount)` credits the cardholder's card
    // with the given amount and prints both merchant + customer receipts.
    // Callers typically guard with isRefundable() on the order first.
    function runRefund(msg) {
      var reqId = msg.requestId;
      if (!terminal || !ctx) {
        rn({ type: 'error', requestId: reqId, message: 'Till is not open' });
        return;
      }

      // Reset receipt buffer for this transaction so receiptGenerated events
      // from a previous tx don't bleed in.
      ctx.pendingReceipts = [];

      try {
        rn({ type: 'status', message: 'Present card\u2026' });
        runStep(ctx, 'Refund', 180000, function (done) {
          ctx.txResolver = done;
          terminal.transactionAsync(
            timapi.constants.TransactionType.credit,
            new timapi.Amount(msg.amountCents, timapi.constants.Currency.AUD),
            (msg.referenceId && typeof msg.referenceId === 'string') ? msg.referenceId : undefined
          );
        }).then(function (wrapper) {
          var data = wrapper && wrapper.data;
          try { terminal.commitAsync(); } catch (_) { /* non-fatal */ }

          var receipts = extractReceipts(data);
          var pending = ctx.pendingReceipts || [];
          for (var i = 0; i < pending.length; i++) {
            receipts = mergeReceipts(receipts, pending[i]);
          }
          ctx.pendingReceipts = null;

          rn({
            type:            'approved',
            requestId:       reqId,
            transactionRef:  (data && data.transactionReference) || null,
            authCode:        (data && data.authorisationCode)    || null,
            maskedPan:       (data && data.maskedPan)            || null,
            cardType:        (data && data.cardType)             || null,
            rrn:             (data && data.rrn)                  || null,
            merchantReceipt: receipts.merchant,
            customerReceipt: receipts.customer,
          });
        }).catch(function (err) {
          if (ctx) ctx.pendingReceipts = null;
          rn(errorPayload(reqId, err, 'Transaction'));
        });
      } catch (e) {
        rn(errorPayload(reqId, e, 'Transaction'));
      }
    }

    // ── Reversal (requires open till) ──────────────────────────────────────
    // The TIM API treats a reversal as `transactionAsync(reversal, amount)`
    // — the terminal looks up the last transaction matching that amount in
    // its local history and reverses it. There is NO separate
    // `reversalAsync()` method on the Terminal class (verified by
    // enumerating Terminal.prototype). If the current SDK build doesn't
    // carry the 'reversal' enum (very old bundles), we respond with a
    // graceful error instead of crashing.
    function runReversal(msg) {
      var reqId = msg.requestId;
      if (!terminal || !ctx) {
        rn({ type: 'error', requestId: reqId, message: 'Till is not open' });
        return;
      }
      var reversalEnum = null;
      try {
        reversalEnum = timapi
          && timapi.constants
          && timapi.constants.TransactionType
          && timapi.constants.TransactionType.reversal;
      } catch (_) { /* ignore */ }
      if (!reversalEnum) {
        rn({ type: 'error', requestId: reqId, message: 'Reversal not supported by terminal' });
        return;
      }

      ctx.pendingReceipts = [];
      try {
        rn({ type: 'status', message: 'Reversing\u2026' });
        runStep(ctx, 'Reversal', 120000, function (done) {
          ctx.txResolver = done;
          // The TIM API Reversal takes the original amount as the anchor for
          // the terminal to find the transaction in its local batch. The
          // originalTransactionRef (if supplied) is passed as the reference
          // string so the terminal can cross-check.
          var amount = new timapi.Amount(
            typeof msg.amountCents === 'number' ? msg.amountCents : 0,
            timapi.constants.Currency.AUD,
          );
          var ref = (msg.originalTransactionRef && typeof msg.originalTransactionRef === 'string')
            ? msg.originalTransactionRef
            : undefined;
          terminal.transactionAsync(reversalEnum, amount, ref);
        }).then(function (wrapper) {
          var data = wrapper && wrapper.data;
          try { terminal.commitAsync(); } catch (_) { /* non-fatal */ }

          var receipts = extractReceipts(data);
          var pending = ctx.pendingReceipts || [];
          for (var i = 0; i < pending.length; i++) {
            receipts = mergeReceipts(receipts, pending[i]);
          }
          ctx.pendingReceipts = null;

          rn({
            type:            'approved',
            requestId:       reqId,
            transactionRef:  (data && data.transactionReference) || null,
            authCode:        (data && data.authorisationCode)    || null,
            maskedPan:       (data && data.maskedPan)            || null,
            cardType:        (data && data.cardType)             || null,
            rrn:             (data && data.rrn)                  || null,
            merchantReceipt: receipts.merchant,
            customerReceipt: receipts.customer,
          });
        }).catch(function (err) {
          if (ctx) ctx.pendingReceipts = null;
          rn(errorPayload(reqId, err, 'Transaction'));
        });
      } catch (e) {
        rn(errorPayload(reqId, e, 'Transaction'));
      }
    }

    // ── EOD Reconciliation (requires open till) ────────────────────────────
    // Runs the TIM API reconciliationAsync → reconciliationCompleted flow.
    // On success the terminal prints its own bank-settlement receipt AND
    // returns the same text via the receipts array so we can also print it
    // from the POS receipt printer. If the SDK build doesn't expose
    // reconciliationAsync (e.g. very old bundles) we respond with a null
    // receipt rather than crashing — the caller treats this as "reconcile
    // unsupported, skip".
    function runReconciliation(msg) {
      var reqId = msg.requestId;
      if (!terminal || !ctx) {
        rn({ type: 'error', requestId: reqId, message: 'Till is not open' });
        return;
      }
      if (typeof terminal.reconciliationAsync !== 'function') {
        rn({ type: 'reconciliation_done', requestId: reqId, reconciliationReceipt: null });
        return;
      }

      ctx.pendingReceipts = [];
      try {
        rn({ type: 'status', message: 'Reconciling\u2026' });
        runStep(ctx, 'Reconciliation', 120000, function (done) {
          ctx.reconcileResolver = done;
          try { terminal.reconciliationAsync(); } catch (err) { done({ exception: err }); }
        }).then(function (wrapper) {
          var data = wrapper && wrapper.data;
          var receipts = extractReceipts(data);
          var pending = ctx.pendingReceipts || [];
          for (var i = 0; i < pending.length; i++) {
            receipts = mergeReceipts(receipts, pending[i]);
          }
          ctx.pendingReceipts = null;
          // Prefer merchant copy (bank settlement report); fall back to
          // customer copy if that's all the terminal returned.
          var text = receipts.merchant || receipts.customer || null;
          rn({ type: 'reconciliation_done', requestId: reqId, reconciliationReceipt: text });
        }).catch(function (err) {
          if (ctx) ctx.pendingReceipts = null;
          rn(errorPayload(reqId, err, 'Transaction'));
        });
      } catch (e) {
        rn(errorPayload(reqId, e, 'Transaction'));
      }
    }

    // ── Close Till: Deactivate → Logout → Dispose ──────────────────────────
    function closeTill(msg) {
      var reqId = msg.requestId;
      if (!terminal || !ctx) {
        rn({ type: 'error', requestId: reqId, message: 'Till is not open' });
        return;
      }

      rn({ type: 'status', message: 'Deactivating\u2026' });
      runStep(ctx, 'Deactivate', 30000, function (done) {
        ctx.deactivateResolver = done;
        try { terminal.deactivateAsync(); } catch (err) { done({ exception: err }); }
      }).then(function () {
        rn({ type: 'status', message: 'Logging out\u2026' });
        return runStep(ctx, 'Logout', 30000, function (done) {
          ctx.logoutResolver = done;
          try { terminal.logoutAsync(); } catch (err) { done({ exception: err }); }
        });
      }).then(function () {
        try { if (terminal && terminal.dispose) terminal.dispose(); } catch (_) { /* ignore */ }
        terminal = null;
        ctx = null;
        rn({ type: 'till_closed', requestId: reqId });
      }).catch(function (err) {
        // Even on error, try to dispose and null out so the next openTill
        // can start fresh.
        try { if (terminal && terminal.dispose) terminal.dispose(); } catch (_) { /* ignore */ }
        terminal = null;
        ctx = null;
        rn(errorPayload(reqId, err, 'CloseTill'));
      });
    }
  </script>

  <!--
    timapi.js MUST be in the same folder as this HTML file.
    It fires window.onTimApiReady when loaded and WASM is compiled.
    The src path is relative to this file in Android assets.
  -->
  <script src="timapi.js" onerror="rn({ type: 'error', message: 'timapi.js not found. Place timapi.js and timapi.wasm in apps/mobile/assets/timapi/.' })"></script>
</head>
<body style="background:#000;margin:0;padding:0;"></body>
</html>
